<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>도서 위치 스냅샷 검색기 (2단계 방식)</title>
<style>
:root {
--primary-color: #3498db;     /* 사진 찍기 (파랑) */
--search-color: #2ecc71;      /* 책 찾기 (초록) */
--reset-color: #e74c3c;       /* 다시 찍기 (빨강) */
--bg-color: #f5f6fa;
--container-bg: #ffffff;
--text-color: #2f3640;
}

body {
font-family: 'Noto Sans KR', sans-serif;
background-color: var(--bg-color);
margin: 0;
padding: 15px;
color: var(--text-color);
display: flex;
flex-direction: column;
align-items: center;
}

h1 {
font-size: 1.4rem;
color: #1abc9c;
margin-bottom: 15px;
text-align: center;
}

.control-box {
width: 100%;
max-width: 500px;
display: flex;
flex-direction: column;
gap: 10px;
margin-bottom: 15px;
box-sizing: border-box;
}

.input-row {
display: flex;
width: 100%;
gap: 8px;
}

input {
flex: 1;
padding: 10px 15px;
font-size: 0.95rem;
border: 2px solid #ced4da;
border-radius: 30px;
outline: none;
box-sizing: border-box;
}

input:focus { border-color: var(--primary-color); }

#api-key-input {
border-color: #34495e;
background-color: #f8f9fa;
}

/* 버튼 기본 스타일 */
.btn {
padding: 10px 20px;
font-size: 0.95rem;
font-weight: bold;
color: #fff;
border: none;
border-radius: 30px;
cursor: pointer;
white-space: nowrap;
flex: 1;
transition: background-color 0.2s;
}

.btn:disabled { background-color: #95a5a6; cursor: not-allowed; }

#capture-btn { background-color: var(--primary-color); }
#search-btn { background-color: var(--search-color); display: none; }
#reset-btn { background-color: var(--reset-color); display: none; }

#display-container {
position: relative;
width: 100%;
max-width: 500px;
aspect-ratio: 4 / 3;
border-radius: 12px;
overflow: hidden;
box-shadow: 0 8px 20px rgba(0,0,0,0.15);
background-color: #000;
}

video, canvas {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
object-fit: cover;
}

/* 사진 고정용 캔버스는 처음에 숨김 */
canvas {
z-index: 1;
display: none;
}

#status-panel {
width: 100%;
max-width: 500px;
margin-top: 12px;
background: var(--container-bg);
padding: 12px 15px;
border-radius: 10px;
border: 1px solid #dcdde1;
box-sizing: border-box;
font-size: 0.9rem;
text-align: center;
}

.highlight { color: #e74c3c; font-weight: bold; }
</style>
</head>
<body>

<h1>🔍 도서 위치 검색기 (촬영 후 검색)</h1>

<div class="control-box">
    <div class="input-row">
        <input type="password" id="api-key-input" placeholder="Gemini API Key를 입력하세요">
    </div>
    <div class="input-row">
        <input type="text" id="book-input" placeholder="책 제목 입력 (예: 완득이)">
    </div>
    <div class="input-row" id="btn-group">
        <button id="capture-btn" class="btn">📸 사진 찍기</button>
        <button id="search-btn" class="btn">🔍 책 찾기</button>
        <button id="reset-btn" class="btn">🔄 다시 찍기</button>
    </div>
</div>

<div id="display-container">
<video id="webcam" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>
</div>

<div id="status-panel">
<div id="status-text">먼저 책장을 향해 카메라를 대고 [사진 찍기]를 누르세요.</div>
</div>

<script>
const video = document.getElementById('webcam');
const canvas = document.getElementById('overlay');
const ctx = canvas.getContext('2d');

const apiKeyInput = document.getElementById('api-key-input');
const bookInput = document.getElementById('book-input');

// 버튼 요소들
const captureBtn = document.getElementById('capture-btn');
const searchBtn = document.getElementById('search-btn');
const resetBtn = document.getElementById('reset-btn');
const statusText = document.getElementById('status-text');

// 촬영된 사진의 Base64 데이터를 임시 저장할 변수
let capturedBase64 = null;

if (localStorage.getItem('gemini_api_key')) {
    apiKeyInput.value = localStorage.getItem('gemini_api_key');
}

// 모바일 카메라 연결
async function initCamera() {
    const constraintsOptions = [
        { video: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 480 } } },
        { video: { facingMode: "environment" } },
        { video: true }
    ];

    let stream = null;
    for (let currentConstraints of constraintsOptions) {
        try {
            stream = await navigator.mediaDevices.getUserMedia(currentConstraints);
            if (stream) break;
        } catch (e) {
            console.warn("카메라 로드 실패:", e);
        }
    }

    if (stream) {
        video.srcObject = stream;
        video.play().catch(e => console.log(e));
        video.addEventListener('loadedmetadata', () => {
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
        });
    } else {
        statusText.innerHTML = "<span style='color:red;'>카메라 권한 거부됨.</span>";
    }
}

initCamera();

// 이벤트 연결
captureBtn.addEventListener('click', captureSnapshot);
searchBtn.addEventListener('click', searchBookInSnapshot);
resetBtn.addEventListener('click', resetToCamera);
bookInput.addEventListener('keypress', (e) => { if(e.key === 'Enter' && searchBtn.style.display !== 'none') searchBookInSnapshot(); });

// [단계 1] 사진 찍기 함수
function captureSnapshot() {
    // 캔버스에 현재 카메라 화면을 그대로 그림
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    // API에 보낼 base64 이미지 추출 및 저장
    capturedBase64 = canvas.toDataURL('image/jpeg').split(',')[1];

    // 실시간 비디오 위에 사진(캔버스)을 덮어씌워 화면을 고정
    canvas.style.display = "block";

    // 버튼 상태 UI 전환 (사진 찍기 숨기고 -> 찾기/다시찍기 노출)
    captureBtn.style.display = "none";
    searchBtn.style.display = "inline-block";
    resetBtn.style.display = "inline-block";

    statusText.innerHTML = "📸 사진이 고정되었습니다. <br>이제 <b>책 제목</b>을 입력하고 <b>[책 찾기]</b>를 누르세요.";
}

// [단계 2] 찍은 사진 안에서 책 찾기 요청 함수
async function searchBookInSnapshot() {
    const apiKey = apiKeyInput.value.trim();
    const targetTitle = bookInput.value.trim();

    if (!apiKey) { alert("Gemini API 키를 입력하세요."); apiKeyInput.focus(); return; }
    if (!targetTitle) { alert("책 제목을 입력하세요."); bookInput.focus(); return; }

    localStorage.setItem('gemini_api_key', apiKey);

    // 검색 중 버튼 비활성화
    searchBtn.disabled = true;
    resetBtn.disabled = true;
    searchBtn.textContent = "분석 중...";
    statusText.innerHTML = `<span class='highlight'>"${targetTitle}"</span> 위치를 사진에서 분석하고 있습니다...`;

    // 기존에 그려져 있던 경계 상자나 글씨 초기화 (사진 원본만 다시 그려두기)
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const img = new Image();
    img.src = "data:image/jpeg;base64," + capturedBase64;
    img.onload = async function() {
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        
        // 이미지 복구 완료 후 API 호출 진행
        await callGeminiAPI(apiKey, targetTitle);
    };
}

// Gemini API 실제 호출부
async function callGeminiAPI(apiKey, targetTitle) {
    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

    const prompt = `주어진 이미지에서 책장에 꽂힌 책들 중 제목이 "${targetTitle}"인 도서를 찾아주세요.
만약 해당 도서가 존재한다면 그 책의 영역을 감싸는 경계 상자(Bounding Box) 좌표를 [ymin, xmin, ymax, xmax] 형태로 반환해줘.
좌표 값은 이미지 크기를 기준으로 0에서 1000 사이의 숫자로 정규화(Normalized)해야 해.
출력은 부가 설명이나 코드 블록 없이 무조건 아래 명시된 JSON 형식으로만 응답해줘:
{"found": true, "box": [ymin, xmin, ymax, xmax]} 또는 책을 찾지 못했다면 {"found": false}`;

    const payload = {
        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: capturedBase64 } }] }],
        generationConfig: { responseMimeType: "application/json" }
    };

    try {
        const response = await fetch(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error(`서버 응답 오류 (${response.status})`);

        const data = await response.json();
        let textResponse = data.candidates[0].content.parts[0].text;
        textResponse = textResponse.replace(/```json|```/g, '').trim();

        const result = JSON.parse(textResponse);

        if (result.found && result.box) {
            statusText.innerHTML = `🎯 <span style='color:#2ecc71; font-weight:bold;'>"${targetTitle}"</span> 위치를 발견했습니다!`;
            drawTargetUI(result.box);
        } else {
            statusText.innerHTML = `❌ <span style='color:#e74c3c; font-weight:bold;'>사진 안에서 해당 책을 찾지 못했습니다.</span>`;
            drawNotFoundUI();
        }

    } catch (error) {
        console.error(error);
        statusText.innerHTML = `<span style='color:red;'>오류 발생: ${error.message}</span>`;
    } finally {
        searchBtn.disabled = false;
        resetBtn.disabled = false;
        searchBtn.textContent = "🔍 책 찾기";
    }
}

// [초기화] 다시 실시간 카메라 화면으로 돌아가기
function resetToCamera() {
    capturedBase64 = null;
    
    // 캔버스 비우고 숨기기 -> 뒤쪽 실시간 비디오 노출
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvas.style.display = "none";

    // 버튼 상태 원상복구
    captureBtn.style.display = "inline-block";
    searchBtn.style.display = "none";
    resetBtn.style.display = "none";

    statusText.innerText = "카메라가 다시 시작되었습니다. [사진 찍기]를 누르세요.";
}

// 사진 위에 타겟 박스 그리기
function drawTargetUI(box) {
    const ymin = (box[0] / 1000) * canvas.height;
    const xmin = (box[1] / 1000) * canvas.width;
    const ymax = (box[2] / 1000) * canvas.height;
    const xmax = (box[3] / 1000) * canvas.width;

    const boxWidth = xmax - xmin;
    const centerX = xmin + (boxWidth / 2);
    const targetTopY = ymin - 8;

    // 초록색 사각형 박스
    ctx.strokeStyle = '#2ecc71';
    ctx.lineWidth = 5;
    ctx.strokeRect(xmin, ymin, boxWidth, ymax - ymin);

    // 상단 빨간색 지시 화살표
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath();
    ctx.moveTo(centerX - 15, targetTopY - 25);
    ctx.lineTo(centerX + 15, targetTopY - 25);
    ctx.lineTo(centerX, targetTopY);
    ctx.closePath();
    ctx.fill();
}

// 책이 없을 때 사진 위에 안내 메시지 얹기
function drawNotFoundUI() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#e74c3c';
    ctx.font = 'bold 24px "Noto Sans KR", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('해당 책이 없습니다 ❌', canvas.width / 2, canvas.height / 2);
}
</script>
</body>
</html>
