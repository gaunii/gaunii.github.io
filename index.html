<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>도서 위치 검색기 (세로쓰기 정밀 추적 버전)</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
:root {
--primary-color: #3498db;
--search-color: #2ecc71;
--reset-color: #e74c3c;
--bg-color: #f5f6fa;
--container-bg: #ffffff;
--text-color: #2f3640;
}

body {
font-family: 'Noto Sans KR', sans-serif;
background-color: var(--bg-color);
margin: 0;
padding: 15px;
color: var(--text-color);
display: flex;
flex-direction: column;
align-items: center;
}

h1 {
font-size: 1.4rem;
color: #1abc9c;
margin-bottom: 15px;
text-align: center;
}

.control-box {
width: 100%;
max-width: 500px;
display: flex;
flex-direction: column;
gap: 10px;
margin-bottom: 15px;
box-sizing: border-box;
}

.input-row {
  display: flex;
  width: 100%;
  gap: 8px;
}

input {
flex: 1;
padding: 10px 15px;
font-size: 0.95rem;
border: 2px solid #ced4da;
border-radius: 30px;
outline: none;
box-sizing: border-box;
}

input:focus { border-color: var(--primary-color); }

.btn {
padding: 10px 20px;
font-size: 0.95rem;
font-weight: bold;
color: #fff;
border: none;
border-radius: 30px;
cursor: pointer;
white-space: nowrap;
flex: 1;
transition: background-color 0.2s;
}

.btn:disabled { background-color: #95a5a6; cursor: not-allowed; }

#capture-btn { background-color: var(--primary-color); }
#search-btn { background-color: var(--search-color); display: none; }
#reset-btn { background-color: var(--reset-color); display: none; }

#display-container {
position: relative;
width: 100%;
max-width: 500px;
border-radius: 12px;
overflow: hidden;
box-shadow: 0 8px 20px rgba(0,0,0,0.15);
background-color: #000;
}

video, canvas {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
}

video { object-fit: contain; }
canvas { object-fit: contain; z-index: 1; display: none; }

#status-panel {
width: 100%;
max-width: 500px;
margin-top: 12px;
background: var(--container-bg);
padding: 12px 15px;
border-radius: 10px;
border: 1px solid #dcdde1;
box-sizing: border-box;
font-size: 0.9rem;
text-align: center;
}

.highlight { color: #e74c3c; font-weight: bold; }
</style>
</head>
<body>

<h1>🔍 도서 위치 검색기 (세로글씨 보정)</h1>

<div class="control-box">
    <div class="input-row">
        <input type="text" id="book-input" placeholder="책 제목 입력 (예: 완득이)">
    </div>
    <div class="input-row" id="btn-group">
        <button id="capture-btn" class="btn">📸 사진 찍기</button>
        <button id="search-btn" class="btn">🔍 책 찾기</button>
        <button id="reset-btn" class="btn">🔄 다시 찍기</button>
    </div>
</div>

<div id="display-container">
<video id="webcam" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>
</div>

<div id="status-panel">
<div id="status-text">카메라 연결을 준비 중입니다...</div>
</div>

<script>
const container = document.getElementById('display-container');
const video = document.getElementById('webcam');
const canvas = document.getElementById('overlay');
const ctx = canvas.getContext('2d');
const bookInput = document.getElementById('book-input');
const captureBtn = document.getElementById('capture-btn');
const searchBtn = document.getElementById('search-btn');
const resetBtn = document.getElementById('reset-btn');
const statusText = document.getElementById('status-text');

let capturedImageElement = null; 

async function initCamera() {
    statusText.innerText = "카메라를 연결하는 중...";
    const constraintsOptions = [
        { video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } },
        { video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } },
        { video: true }
    ];

    let stream = null;
    for (let currentConstraints of constraintsOptions) {
        try {
            stream = await navigator.mediaDevices.getUserMedia(currentConstraints);
            if (stream) break;
        } catch (e) {
            console.warn("카메라 셋업 실패:", e);
        }
    }

    if (stream) {
        video.srcObject = stream;
        video.play().catch(e => console.log(e));
        video.addEventListener('loadedmetadata', () => {
            const aspect = video.videoHeight / video.videoWidth;
            container.style.height = (container.clientWidth * aspect) + "px";
            statusText.innerText = "준비 완료! 책등 글씨가 잘 보이게 찍어주세요.";
        });
    } else {
        statusText.innerHTML = "<span style='color:red;'>카메라 권한 거부됨.</span>";
    }
}

initCamera();

window.addEventListener('resize', () => {
    if (video.videoWidth) {
        const aspect = video.videoHeight / video.videoWidth;
        container.style.height = (container.clientWidth * aspect) + "px";
    }
});

captureBtn.addEventListener('click', captureSnapshot);
searchBtn.addEventListener('click', searchBookInSnapshot);
resetBtn.addEventListener('click', resetToCamera);

// 지독한 명암 차이를 극대화하여 글씨 윤곽만 남기는 강력한 이진화 필터
function enhanceTextContrast(context, width, height) {
    const imageData = context.getImageData(0, 0, width, height);
    const data = imageData.data;
    for (let i = 0; i < data.length; i += 4) {
        const gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
        // 어설픈 회색조는 전부 날리고 완전한 블랙 & 화이트로 변환
        const v = (gray > 110) ? 255 : 0;
        data[i] = v; data[i+1] = v; data[i+2] = v;
    }
    context.putImageData(imageData, 0, 0);
}

function captureSnapshot() {
    if (!video.videoWidth) { alert("카메라 준비 중입니다."); return; }
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    capturedImageElement = new Image();
    capturedImageElement.src = canvas.toDataURL('image/jpeg', 1.0);
    canvas.style.display = "block";

    captureBtn.style.display = "none";
    searchBtn.style.display = "inline-block";
    resetBtn.style.display = "inline-block";
    statusText.innerHTML = "📸 사진 촬영 완료! <br>[책 찾기]를 누르면 음절 단위 분석을 시작합니다.";
}

// [핵심 엔진] 낱글자 조합 기반 세로쓰기 탐색 알고리즘
async function searchBookInSnapshot() {
    const targetTitle = bookInput.value.trim().replace(/\s+/g, ""); // 검색어 공백 제거
    if (!targetTitle) { alert("책 제목을 입력하세요."); bookInput.focus(); return; }

    searchBtn.disabled = true;
    resetBtn.disabled = true;
    searchBtn.textContent = "낱글자 추적 중...";
    statusText.innerHTML = `⏳ 세로/가로 글자 자장을 결합하여 <b>"${targetTitle}"</b>을 조합하고 있습니다...`;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(capturedImageElement, 0, 0, canvas.width, canvas.height);

    const ocrCanvas = document.createElement('canvas');
    ocrCanvas.width = canvas.width; ocrCanvas.height = canvas.height;
    const ocrCtx = ocrCanvas.getContext('2d');
    ocrCtx.drawImage(capturedImageElement, 0, 0, ocrCanvas.width, ocrCanvas.height);
    enhanceTextContrast(ocrCtx, ocrCanvas.width, ocrCanvas.height);

    try {
        const worker = await Tesseract.createWorker(['kor', 'eng']);
        const ret = await worker.recognize(ocrCanvas);
        
        // [변경 포인트] 단어 단위가 아닌 기호/음절(symbols) 단위까지 파괴하여 데이터 획득
        const symbols = [];
        if (ret.data && ret.data.blocks) {
            ret.data.blocks.forEach(block => {
                block.paragraphs.forEach(para => {
                    para.lines.forEach(line => {
                        line.words.forEach(word => {
                            word.symbols.forEach(sym => {
                                // 노이즈 문자를 제하고 의미 있는 한글/영문/숫자만 수집
                                const cleanSym = sym.text.replace(/[^ㄱ-ㅎ|ㅏ-ㅣ|가-힣|a-zA-Z0-9]/g, "");
                                if (cleanSym) {
                                    symbols.push({ text: cleanSym, bbox: sym.bbox });
                                }
                            });
                        });
                    });
                });
            });
        }
        await worker.terminate();

        let finalTargetBbox = null;
        
        // 낱글자 순회 탐색 시작
        for (let i = 0; i < symbols.length; i++) {
            // 사용자가 입력한 단어의 첫 글자(예: '완득이'의 '완')를 만나면 추적 시동
            if (symbols[i].text === targetTitle[0]) {
                let currentMatchedCount = 1;
                let trackBoxes = [symbols[i].bbox];
                let lastBbox = symbols[i].bbox;

                // 첫 글자 발견 후, 나머지 글자들('득', '이')이 주변에 배치되어 있는지 기하학적 검사
                for (let j = 1; j < targetTitle.length; j++) {
                    const nextChar = targetTitle[j];
                    
                    // 나머지 모든 글자 풀을 뒤져서 수직 하단 또는 수평 우측에 연속되는지 대조
                    let foundNext = symbols.find(subSym => {
                        if (subSym.text !== nextChar) return false;
                        
                        const b = subSym.bbox;
                        // 세로쓰기 조건 검증: 직전 글자의 아래쪽에 위치하는가?
                        const isVerticalNext = Math.abs((lastBbox.x0 + lastBbox.x1)/2 - (b.x0 + b.x1)/2) < (lastBbox.x1 - lastBbox.x0) * 1.5 && 
                                               (b.y0 >= lastBbox.y0 && b.y0 <= lastBbox.y1 + (lastBbox.y1 - lastBbox.y0) * 2.5);
                        
                        // 가로쓰기 조건 검증: 직전 글자의 오른쪽에 위치하는가?
                        const isHorizontalNext = Math.abs((lastBbox.y0 + lastBbox.y1)/2 - (b.y0 + b.y1)/2) < (lastBbox.y1 - lastBbox.y0) * 1.0 && 
                                                 (b.x0 >= lastBbox.x0 && b.x0 <= lastBbox.x1 + (lastBbox.x1 - lastBbox.x0) * 2.5);

                        return isVerticalNext || isHorizontalNext;
                    });

                    if (foundNext) {
                        currentMatchedCount++;
                        trackBoxes.push(foundNext.bbox);
                        lastBbox = foundNext.bbox; // 추적 기준점 갱신
                    } else {
                        break; // 연속성이 끊기면 실패 처리
                    }
                }

                // 입력한 제목의 모든 글자가 끊기지 않고 연결되었다면 최종 타겟으로 인정!
                if (currentMatchedCount === targetTitle.length) {
                    finalTargetBbox = {
                        x0: Math.min(...trackBoxes.map(b => b.x0)),
                        y0: Math.min(...trackBoxes.map(b => b.y0)),
                        x1: Math.max(...trackBoxes.map(b => b.x1)),
                        y1: Math.max(...trackBoxes.map(b => b.y1))
                    };
                    break;
                }
            }
        }

        if (finalTargetBbox) {
            statusText.innerHTML = `🎯 세로쓰기 조합 성공! <span style='color:#2ecc71; font-weight:bold;'>"${targetTitle}"</span> 위치를 고정했습니다.`;
            drawCombinedUI(finalTargetBbox);
        } else {
            statusText.innerHTML = `❌ <span style='color:#e74c3c; font-weight:bold;'>글자 결합에 실패했습니다. 더 정면에서 가까이 찍어보세요.</span>`;
            drawNotFoundUI();
        }

    } catch (error) {
        console.error(error);
        statusText.innerHTML = `<span style='color:red;'>오류 발생: ${error.message}</span>`;
    } finally {
        searchBtn.disabled = false;
        resetBtn.disabled = false;
        searchBtn.textContent = "🔍 책 찾기";
    }
}

function resetToCamera() {
    capturedImageElement = null;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvas.style.display = "none";
    captureBtn.style.display = "inline-block";
    searchBtn.style.display = "none";
    resetBtn.style.display = "none";
    statusText.innerText = "카메라 재개됨. [사진 찍기]를 누르세요.";
}

// 결합된 전체 글자 영역 묶어서 크게 사각형 박싱하기
function drawCombinedUI(bbox) {
    const xmin = bbox.x0;
    const ymin = bbox.y0;
    const boxWidth = bbox.x1 - bbox.x0;
    const boxHeight = bbox.y1 - bbox.y0;
    
    const centerX = xmin + (boxWidth / 2);
    const targetTopY = ymin - 8;

    ctx.strokeStyle = '#2ecc71';
    ctx.lineWidth = Math.max(5, canvas.width / 200);
    ctx.strokeRect(xmin, ymin, boxWidth, boxHeight);

    ctx.fillStyle = '#e74c3c';
    ctx.beginPath();
    const arrowSize = Math.max(15, canvas.width / 60);
    ctx.moveTo(centerX - arrowSize, targetTopY - (arrowSize * 1.3));
    ctx.lineTo(centerX + arrowSize, targetTopY - (arrowSize * 1.3));
    ctx.lineTo(centerX, targetTopY);
    ctx.closePath();
    ctx.fill();
}

function drawNotFoundUI() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#e74c3c';
    ctx.font = 'bold 32px "Noto Sans KR", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('해당 책이 없습니다 ❌', canvas.width / 2, canvas.height / 2);
}
</script>
</body>
</html>
