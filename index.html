<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>도서 위치 스냅샷 검색기 (Tesseract 인식률 극대화 패치)</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
:root {
--primary-color: #3498db;
--search-color: #2ecc71;
--reset-color: #e74c3c;
--bg-color: #f5f6fa;
--container-bg: #ffffff;
--text-color: #2f3640;
}

body {
font-family: 'Noto Sans KR', sans-serif;
background-color: var(--bg-color);
margin: 0;
padding: 15px;
color: var(--text-color);
display: flex;
flex-direction: column;
align-items: center;
}

h1 {
font-size: 1.4rem;
color: #1abc9c;
margin-bottom: 15px;
text-align: center;
}

.control-box {
width: 100%;
max-width: 500px;
display: flex;
flex-direction: column;
gap: 10px;
margin-bottom: 15px;
box-sizing: border-box;
}

.input-row {
  display: flex;
  width: 100%;
  gap: 8px;
}

input {
flex: 1;
padding: 10px 15px;
font-size: 0.95rem;
border: 2px solid #ced4da;
border-radius: 30px;
outline: none;
box-sizing: border-box;
}

input:focus { border-color: var(--primary-color); }

.btn {
padding: 10px 20px;
font-size: 0.95rem;
font-weight: bold;
color: #fff;
border: none;
border-radius: 30px;
cursor: pointer;
white-space: nowrap;
flex: 1;
transition: background-color 0.2s;
}

.btn:disabled { background-color: #95a5a6; cursor: not-allowed; }

#capture-btn { background-color: var(--primary-color); }
#search-btn { background-color: var(--search-color); display: none; }
#reset-btn { background-color: var(--reset-color); display: none; }

#display-container {
position: relative;
width: 100%;
max-width: 500px;
border-radius: 12px;
overflow: hidden;
box-shadow: 0 8px 20px rgba(0,0,0,0.15);
background-color: #000;
}

video, canvas {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
}

video { object-fit: contain; }
canvas { object-fit: contain; z-index: 1; display: none; }

#status-panel {
width: 100%;
max-width: 500px;
margin-top: 12px;
background: var(--container-bg);
padding: 12px 15px;
border-radius: 10px;
border: 1px solid #dcdde1;
box-sizing: border-box;
font-size: 0.9rem;
text-align: center;
}

.highlight { color: #e74c3c; font-weight: bold; }
</style>
</head>
<body>

<h1>🔍 도서 위치 검색기 (정밀 로컬 OCR)</h1>

<div class="control-box">
    <div class="input-row">
        <input type="text" id="book-input" placeholder="책 제목 입력 (예: 완득이)">
    </div>
    <div class="input-row" id="btn-group">
        <button id="capture-btn" class="btn">📸 사진 찍기</button>
        <button id="search-btn" class="btn">🔍 책 찾기</button>
        <button id="reset-btn" class="btn">🔄 다시 찍기</button>
    </div>
</div>

<div id="display-container">
<video id="webcam" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>
</div>

<div id="status-panel">
<div id="status-text">카메라 연결을 준비 중입니다...</div>
</div>

<script>
const container = document.getElementById('display-container');
const video = document.getElementById('webcam');
const canvas = document.getElementById('overlay');
const ctx = canvas.getContext('2d');
const bookInput = document.getElementById('book-input');
const captureBtn = document.getElementById('capture-btn');
const searchBtn = document.getElementById('search-btn');
const resetBtn = document.getElementById('reset-btn');
const statusText = document.getElementById('status-text');

let capturedImageElement = null; 

async function initCamera() {
    statusText.innerText = "카메라를 연결하는 중...";
    const constraintsOptions = [
        // 인식률 향상을 위해 최고 해상도(FHD)를 최우선 요청
        { video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } },
        { video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } },
        { video: true }
    ];

    let stream = null;
    for (let currentConstraints of constraintsOptions) {
        try {
            stream = await navigator.mediaDevices.getUserMedia(currentConstraints);
            if (stream) break;
        } catch (e) {
            console.warn("카메라 셋업 실패, 대안 시도:", e);
        }
    }

    if (stream) {
        video.srcObject = stream;
        video.play().catch(e => console.log(e));
        
        video.addEventListener('loadedmetadata', () => {
            const aspect = video.videoHeight / video.videoWidth;
            container.style.height = (container.clientWidth * aspect) + "px";
            statusText.innerText = "준비 완료! 책장을 정면에서 가깝고 선명하게 비추고 [사진 찍기]를 누르세요.";
        });
    } else {
        statusText.innerHTML = "<span style='color:red;'>카메라 권한 거부됨.</span>";
    }
}

initCamera();

window.addEventListener('resize', () => {
    if (video.videoWidth) {
        const aspect = video.videoHeight / video.videoWidth;
        container.style.height = (container.clientWidth * aspect) + "px";
    }
});

captureBtn.addEventListener('click', captureSnapshot);
searchBtn.addEventListener('click', searchBookInSnapshot);
resetBtn.addEventListener('click', resetToCamera);

// [개선 기능] 이미지를 OCR 최적화용 흑백 고대비 이미지로 변환하는 함수
function preprocessImage(context, width, height) {
    const imageData = context.getImageData(0, 0, width, height);
    const data = imageData.data;
    
    for (let i = 0; i < data.length; i += 4) {
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];
        
        // 1. 인간의 눈에 맞춘 정밀 회색조(Grayscale) 공식 적용
        let gray = 0.299 * r + 0.587 * g + 0.114 * b;
        
        // 2. 대비(Contrast)를 강제로 강화하여 글자 경계를 뚜렷하게 유도
        const threshold = 128; // 임계값
        gray = gray > threshold ? 230 : 25; 
        
        data[i] = gray;
        data[i+1] = gray;
        data[i+2] = gray;
    }
    context.putImageData(imageData, 0, 0);
}

function captureSnapshot() {
    if (!video.videoWidth) { alert("카메라 준비 중입니다."); return; }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    // 원본 컬러 스냅샷 저장 (화면 표시 및 전송용)
    capturedImageElement = new Image();
    capturedImageElement.src = canvas.toDataURL('image/jpeg', 1.0);
    
    canvas.style.display = "block";

    captureBtn.style.display = "none";
    searchBtn.style.display = "inline-block";
    resetBtn.style.display = "inline-block";

    statusText.innerHTML = "📸 고화질 촬영 완료! <br>책 제목을 입력하고 <b>[책 찾기]</b>를 누르세요.";
}

async function searchBookInSnapshot() {
    const targetTitle = bookInput.value.trim();
    if (!targetTitle) { alert("책 제목을 입력하세요."); bookInput.focus(); return; }

    searchBtn.disabled = true;
    resetBtn.disabled = true;
    searchBtn.textContent = "OCR 판별 중...";
    statusText.innerHTML = `⚙️ 자체 엔진 필터를 적용하여 문자를 정밀 판독하고 있습니다...`;

    // 1. 원본 이미지 복구
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(capturedImageElement, 0, 0, canvas.width, canvas.height);

    // 2. [인식률 패치 핵심] OCR 분석용 가상 흑백 캔버스 생성
    const ocrCanvas = document.createElement('canvas');
    ocrCanvas.width = canvas.width;
    ocrCanvas.height = canvas.height;
    const ocrCtx = ocrCanvas.getContext('2d');
    ocrCtx.drawImage(capturedImageElement, 0, 0, ocrCanvas.width, ocrCanvas.height);
    preprocessImage(ocrCtx, ocrCanvas.width, ocrCanvas.height); // 흑백 고대비 전처리 가동

    try {
        // Tesseract 엔진 로드 및 성능 위주의 경량 설정 매핑
        const worker = await Tesseract.createWorker(['kor', 'eng']);
        
        // 흑백 처리된 이미지를 넘겨 글씨 시인성을 극대화함
        const ret = await worker.recognize(ocrCanvas);
        const words = ret.data.words; 
        await worker.terminate();

        let matchFound = false;

        // 비교 대상 문자열의 공백 및 특수문자 제거 가공
        const cleanTarget = targetTitle.replace(/[^ㄱ-ㅎ|ㅏ-ㅣ|가-힣|a-zA-Z0-9]/g, "");

        for (let word of words) {
            // OCR이 읽은 단어의 불순물 제거
            const cleanWord = word.text.replace(/[^ㄱ-ㅎ|ㅏ-ㅣ|가-힣|a-zA-Z0-9]/g, "");
            
            if (cleanWord === "" || cleanTarget === "") continue;

            // [인식률 패치 2] 완벽 일치가 아니더라도, 부분 포함 관계가 성립하면 타겟으로 판정
            if (cleanWord.includes(cleanTarget) || cleanTarget.includes(cleanWord)) {
                drawTargetUI(word.bbox);
                matchFound = true;
                break; 
            }
        }

        if (matchFound) {
            statusText.innerHTML = `🎯 <span style='color:#2ecc71; font-weight:bold;'>"${targetTitle}"</span> 위치를 찾아냈습니다!`;
        } else {
            statusText.innerHTML = `❌ <span style='color:#e74c3c; font-weight:bold;'>단어를 찾지 못했습니다. 조금 더 정면에서 가까이 찍어보세요.</span>`;
            drawNotFoundUI();
        }

    } catch (error) {
        console.error(error);
        statusText.innerHTML = `<span style='color:red;'>오류 발생: ${error.message}</span>`;
    } finally {
        searchBtn.disabled = false;
        resetBtn.disabled = false;
        searchBtn.textContent = "🔍 책 찾기";
    }
}

function resetToCamera() {
    capturedImageElement = null;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvas.style.display = "none";

    captureBtn.style.display = "inline-block";
    searchBtn.style.display = "none";
    resetBtn.style.display = "none";

    statusText.innerText = "카메라가 다시 시작되었습니다. [사진 찍기]를 누르세요.";
}

function drawTargetUI(bbox) {
    const xmin = bbox.x0;
    const ymin = bbox.y0;
    const boxWidth = bbox.x1 - bbox.x0;
    const boxHeight = bbox.y1 - bbox.y0;
    
    const centerX = xmin + (boxWidth / 2);
    const targetTopY = ymin - 8;

    ctx.strokeStyle = '#2ecc71';
    ctx.lineWidth = Math.max(5, canvas.width / 200);
    ctx.strokeRect(xmin, ymin, boxWidth, boxHeight);

    ctx.fillStyle = '#e74c3c';
    ctx.beginPath();
    const arrowSize = Math.max(15, canvas.width / 60);
    ctx.moveTo(centerX - arrowSize, targetTopY - (arrowSize * 1.3));
    ctx.lineTo(centerX + arrowSize, targetTopY - (arrowSize * 1.3));
    ctx.lineTo(centerX, targetTopY);
    ctx.closePath();
    ctx.fill();
}

function drawNotFoundUI() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#e74c3c';
    ctx.font = 'bold 32px "Noto Sans KR", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('해당 책이 없습니다 ❌', canvas.width / 2, canvas.height / 2);
}
</script>
</body>
</html>
