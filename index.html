<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>도서 위치 스냅샷 검색기 (화각 동적 매칭 버전)</title>
<style>
:root {
--primary-color: #3498db;
--search-color: #2ecc71;
--reset-color: #e74c3c;
--bg-color: #f5f6fa;
--container-bg: #ffffff;
--text-color: #2f3640;
}

body {
font-family: 'Noto Sans KR', sans-serif;
background-color: var(--bg-color);
margin: 0;
padding: 15px;
color: var(--text-color);
display: flex;
flex-direction: column;
align-items: center;
}

h1 {
font-size: 1.4rem;
color: #1abc9c;
margin-bottom: 15px;
text-align: center;
}

.control-box {
width: 100%;
max-width: 500px;
display: flex;
flex-direction: column;
gap: 10px;
margin-bottom: 15px;
box-sizing: border-box;
}

.input-row {
display: flex;
width: 100%;
gap: 8px;
}

input {
flex: 1;
padding: 10px 15px;
font-size: 0.95rem;
border: 2px solid #ced4da;
border-radius: 30px;
outline: none;
box-sizing: border-box;
}

input:focus { border-color: var(--primary-color); }

#api-key-input {
border-color: #34495e;
background-color: #f8f9fa;
}

.btn {
padding: 10px 20px;
font-size: 0.95rem;
font-weight: bold;
color: #fff;
border: none;
border-radius: 30px;
cursor: pointer;
white-space: nowrap;
flex: 1;
transition: background-color 0.2s;
}

.btn:disabled { background-color: #95a5a6; cursor: not-allowed; }

#capture-btn { background-color: var(--primary-color); }
#search-btn { background-color: var(--search-color); display: none; }
#reset-btn { background-color: var(--reset-color); display: none; }

/* 고정된 고정비(4/3)를 제거하고 카메라 원본 비율을 따르도록 수정 */
#display-container {
position: relative;
width: 100%;
max-width: 500px;
border-radius: 12px;
overflow: hidden;
box-shadow: 0 8px 20px rgba(0,0,0,0.15);
background-color: #000;
}

video, canvas {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
}

/* 찌그러짐을 방지하기 위해 원본 왜곡 없는 contain 속성 부여 */
video { object-fit: contain; }
canvas { object-fit: contain; z-index: 1; display: none; }

#status-panel {
width: 100%;
max-width: 500px;
margin-top: 12px;
background: var(--container-bg);
padding: 12px 15px;
border-radius: 10px;
border: 1px solid #dcdde1;
box-sizing: border-box;
font-size: 0.9rem;
text-align: center;
}

.highlight { color: #e74c3c; font-weight: bold; }
</style>
</head>
<body>

<h1>🔍 도서 위치 검색기 (비율 매칭)</h1>

<div class="control-box">
    <div class="input-row">
        <input type="password" id="api-key-input" autocomplete="new-password" placeholder="Gemini API Key를 입력하세요">
    </div>
    <div class="input-row">
        <input type="text" id="book-input" placeholder="책 제목 입력 (예: 완득이)">
    </div>
    <div class="input-row" id="btn-group">
        <button id="capture-btn" class="btn">📸 사진 찍기</button>
        <button id="search-btn" class="btn">🔍 책 찾기</button>
        <button id="reset-btn" class="btn">🔄 다시 찍기</button>
    </div>
</div>

<div id="display-container">
<video id="webcam" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>
</div>

<div id="status-panel">
<div id="status-text">카메라 연결을 준비 중입니다...</div>
</div>

<script>
const container = document.getElementById('display-container');
const video = document.getElementById('webcam');
const canvas = document.getElementById('overlay');
const ctx = canvas.getContext('2d');

const apiKeyInput = document.getElementById('api-key-input');
const bookInput = document.getElementById('book-input');

const captureBtn = document.getElementById('capture-btn');
const searchBtn = document.getElementById('search-btn');
const resetBtn = document.getElementById('reset-btn');
const statusText = document.getElementById('status-text');

let capturedBase64 = null;

window.addEventListener('DOMContentLoaded', () => {
    const savedKey = localStorage.getItem('gemini_api_key');
    if (savedKey) apiKeyInput.value = savedKey;
});

apiKeyInput.addEventListener('input', () => {
    localStorage.setItem('gemini_api_key', apiKeyInput.value.trim());
});

async function initCamera() {
    statusText.innerText = "카메라를 연결하는 중...";
    const constraintsOptions = [
        { video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } },
        { video: { facingMode: "environment" } },
        { video: true }
    ];

    let stream = null;
    for (let currentConstraints of constraintsOptions) {
        try {
            stream = await navigator.mediaDevices.getUserMedia(currentConstraints);
            if (stream) break;
        } catch (e) {
            console.warn("카메라 초기화 시도 실패:", e);
        }
    }

    if (stream) {
        video.srcObject = stream;
        video.play().catch(e => console.log(e));
        
        video.addEventListener('loadedmetadata', () => {
            // [핵심 변경] 카메라의 실제 가로세로 비율을 계산하여 화면 박스의 비율을 동적으로 강제 맞춤
            const aspect = video.videoHeight / video.videoWidth;
            const containerWidth = container.clientWidth;
            container.style.height = (containerWidth * aspect) + "px";
            
            statusText.innerText = "준비 완료! 책장을 비추고 [사진 찍기]를 누르세요.";
        });
    } else {
        statusText.innerHTML = "<span style='color:red;'>카메라 권한 거부됨.</span>";
    }
}

initCamera();

// 화면 크기가 변할 때(회전 등) 비율을 재유지하기 위한 리사이즈 핸들러
window.addEventListener('resize', () => {
    if (video.videoWidth) {
        const aspect = video.videoHeight / video.videoWidth;
        container.style.height = (container.clientWidth * aspect) + "px";
    }
});

captureBtn.addEventListener('click', captureSnapshot);
searchBtn.addEventListener('click', searchBookInSnapshot);
resetBtn.addEventListener('click', resetToCamera);

// 사진 찍기: 카메라 원본 해상도 100% 품질로 캡처하여 왜곡 원천 차단
function captureSnapshot() {
    if (!video.videoWidth) { alert("카메라 준비 중입니다."); return; }

    // 캔버스의 실제 내부 드로잉 픽셀 크기를 카메라 하드웨어 크기와 1:1로 일치시킴
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    // 압축 없는 원본 화질 비율로 추출
    capturedBase64 = canvas.toDataURL('image/jpeg', 1.0).split(',')[1];
    canvas.style.display = "block";

    captureBtn.style.display = "none";
    searchBtn.style.display = "inline-block";
    resetBtn.style.display = "inline-block";

    statusText.innerHTML = "📸 왜곡 없는 원본 사진 촬영 완료! <br>[책 찾기] 버튼을 누르세요.";
}

async function searchBookInSnapshot() {
    const apiKey = apiKeyInput.value.trim();
    const targetTitle = bookInput.value.trim();

    if (!apiKey) { alert("Gemini API 키를 입력하세요."); apiKeyInput.focus(); return; }
    if (!targetTitle) { alert("책 제목을 입력하세요."); bookInput.focus(); return; }

    localStorage.setItem('gemini_api_key', apiKey);

    searchBtn.disabled = true;
    resetBtn.disabled = true;
    searchBtn.textContent = "OCR 판별 중...";
    statusText.innerHTML = `<span class='highlight'>"${targetTitle}"</span> 위치 정밀 분석 중...`;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const img = new Image();
    img.src = "data:image/jpeg;base64," + capturedBase64;
    img.onload = async function() {
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        await callGeminiAPI(apiKey, targetTitle);
    };
}

async function callGeminiAPI(apiKey, targetTitle) {
    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

    const prompt = `주어진 이미지에서 시각적 OCR을 수행하여 표지나 책등에 문자로 "${targetTitle}"이(가) 인쇄되어 있는 정확한 위치를 검출해 주세요.
해당 글자 영역에 완벽히 밀착된 단 하나의 경계 상자(Bounding Box) 좌표를 [ymin, xmin, ymax, xmax] 형태로 계산해야 합니다.
좌표값은 이미지의 세로, 가로 크기를 기준으로 0에서 1000 사이의 숫자로 정규화(Normalized)하세요.

출력은 다른 설명문구나 마크다운 코드블록(\`\`\`)을 일절 배제하고 오직 규격화된 아래의 JSON 데이터 포맷 하나만 반환하세요:
{"found": true, "box": [ymin, xmin, ymax, xmax]}
만약 이미지 내에 해당 글자가 인쇄된 도서가 존재하지 않는다면 다음 포맷으로만 출력하세요:
{"found": false}`;

    const payload = {
        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: capturedBase64 } }] }],
        generationConfig: { responseMimeType: "application/json", temperature: 0.1 }
    };

    try {
        const response = await fetch(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error(`서버 에러 (${response.status})`);

        const data = await response.json();
        let textResponse = data.candidates[0].content.parts[0].text;
        textResponse = textResponse.replace(/```json|```/g, '').trim();

        const result = JSON.parse(textResponse);

        if (result.found && result.box) {
            statusText.innerHTML = `🎯 <span style='color:#2ecc71; font-weight:bold;'>"${targetTitle}"</span> 발견했습니다!`;
            drawTargetUI(result.box);
        } else {
            statusText.innerHTML = `❌ <span style='color:#e74c3c; font-weight:bold;'>책을 찾을 수 없습니다.</span>`;
            drawNotFoundUI();
        }

    } catch (error) {
        console.error(error);
        statusText.innerHTML = `<span style='color:red;'>오류 발생: ${error.message}</span>`;
    } finally {
        searchBtn.disabled = false;
        resetBtn.disabled = false;
        searchBtn.textContent = "🔍 책 찾기";
    }
}

function resetToCamera() {
    capturedBase64 = null;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvas.style.display = "none";

    captureBtn.style.display = "inline-block";
    searchBtn.style.display = "none";
    resetBtn.style.display = "none";

    statusText.innerText = "카메라 준비됨. [사진 찍기]를 누르세요.";
}

// 카메라 실제 픽셀과 캔버스 내부 드로잉 픽셀이 1:1로 매핑되어 오차가 소멸합니다.
function drawTargetUI(box) {
    const ymin = (box[0] / 1000) * canvas.height;
    const xmin = (box[1] / 1000) * canvas.width;
    const ymax = (box[2] / 1000) * canvas.height;
    const xmax = (box[3] / 1000) * canvas.width;

    const boxWidth = xmax - xmin;
    const centerX = xmin + (boxWidth / 2);
    const targetTopY = ymin - 8;

    // 고해상도 화질에 맞게 테두리 선 굵기 자동 확보
    ctx.strokeStyle = '#2ecc71';
    ctx.lineWidth = Math.max(4, canvas.width / 200); 
    ctx.strokeRect(xmin, ymin, boxWidth, ymax - ymin);

    // 화살표 가이드 UI 크기 동적 조절
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath();
    const arrowSize = Math.max(15, canvas.width / 60);
    ctx.moveTo(centerX - arrowSize, targetTopY - (arrowSize * 1.3));
    ctx.lineTo(centerX + arrowSize, targetTopY - (arrowSize * 1.3));
    ctx.lineTo(centerX, targetTopY);
    ctx.closePath();
    ctx.fill();
}

function drawNotFoundUI() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#e74c3c';
    ctx.font = 'bold 36px "Noto Sans KR", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('해당 책이 없습니다 ❌', canvas.width / 2, canvas.height / 2);
}
</script>
</body>
</html>
