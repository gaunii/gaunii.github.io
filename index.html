<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>도서 제목 전체 추출기 (무료 로컬 OCR)</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
:root {
--primary-color: #3498db;
--search-color: #9b59b6; /* 전체 추출 느낌의 보라색 */
--reset-color: #e74c3c;
--bg-color: #f5f6fa;
--container-bg: #ffffff;
--text-color: #2f3640;
}

body {
font-family: 'Noto Sans KR', sans-serif;
background-color: var(--bg-color);
margin: 0;
padding: 15px;
color: var(--text-color);
display: flex;
flex-direction: column;
align-items: center;
}

h1 {
font-size: 1.4rem;
color: #1abc9c;
margin-bottom: 15px;
text-align: center;
}

.control-box {
width: 100%;
max-width: 500px;
display: flex;
flex-direction: column;
gap: 10px;
margin-bottom: 15px;
box-sizing: border-box;
}

.input-row {
  display: flex;
  width: 100%;
  gap: 8px;
}

.btn {
padding: 12px 20px;
font-size: 0.95rem;
font-weight: bold;
color: #fff;
border: none;
border-radius: 30px;
cursor: pointer;
white-space: nowrap;
flex: 1;
transition: background-color 0.2s;
}

.btn:disabled { background-color: #95a5a6; cursor: not-allowed; }

#capture-btn { background-color: var(--primary-color); }
#search-btn { background-color: var(--search-color); display: none; }
#reset-btn { background-color: var(--reset-color); display: none; }

#display-container {
position: relative;
width: 100%;
max-width: 500px;
border-radius: 12px;
overflow: hidden;
box-shadow: 0 8px 20px rgba(0,0,0,0.15);
background-color: #000;
margin-bottom: 15px;
}

video, canvas {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
}

video { object-fit: contain; }
canvas { object-fit: contain; z-index: 1; display: none; }

#status-panel {
width: 100%;
max-width: 500px;
background: var(--container-bg);
padding: 12px 15px;
border-radius: 10px;
border: 1px solid #dcdde1;
box-sizing: border-box;
font-size: 0.9rem;
text-align: center;
margin-bottom: 15px;
}

/* 결과 리스트가 노출될 커스텀 박스 */
#result-box {
width: 100%;
max-width: 500px;
background: #ffffff;
border: 2px solid #1abc9c;
border-radius: 12px;
padding: 15px;
box-sizing: border-box;
display: none; /* 결과가 나오면 노출 */
}

#result-box h3 {
margin-top: 0;
margin-bottom: 10px;
font-size: 1.1rem;
color: #1abc9c;
border-bottom: 1px solid #eee;
padding-bottom: 5px;
}

#book-list {
list-style: none;
padding-left: 0;
margin: 0;
text-align: left;
max-height: 250px;
overflow-y: auto;
}

#book-list li {
padding: 6px 10px;
border-bottom: 1px style dashed #f1f2f6;
font-size: 0.95rem;
color: #333;
}

#book-list li:last-child { border-bottom: none; }
</style>
</head>
<body>

<h1>📚 도서 제목 추출기 (리스트업 버전)</h1>

<div class="control-box">
    <div class="input-row" id="btn-group">
        <button id="capture-btn" class="btn">📸 사진 찍기</button>
        <button id="search-btn" class="btn">🔍 전체 책 제목 추출</button>
        <button id="reset-btn" class="btn">🔄 다시 찍기</button>
    </div>
</div>

<div id="display-container">
<video id="webcam" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>
</div>

<div id="status-panel">
<div id="status-text">카메라 연결을 준비 중입니다...</div>
</div>

<div id="result-box">
    <h3>📋 인식된 텍스트 목록</h3>
    <ul id="book-list"></ul>
</div>

<script>
const container = document.getElementById('display-container');
const video = document.getElementById('webcam');
const canvas = document.getElementById('overlay');
const ctx = canvas.getContext('2d');

const captureBtn = document.getElementById('capture-btn');
const searchBtn = document.getElementById('search-btn');
const resetBtn = document.getElementById('reset-btn');
const statusText = document.getElementById('status-text');

const resultBox = document.getElementById('result-box');
const bookList = document.getElementById('book-list');

let capturedImageElement = null; 

async function initCamera() {
    statusText.innerText = "카메라를 연결하는 중...";
    const constraintsOptions = [
        { video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } },
        { video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } },
        { video: true }
    ];

    let stream = null;
    for (let currentConstraints of constraintsOptions) {
        try {
            stream = await navigator.mediaDevices.getUserMedia(currentConstraints);
            if (stream) break;
        } catch (e) {
            console.warn("카메라 셋업 실패:", e);
        }
    }

    if (stream) {
        video.srcObject = stream;
        video.play().catch(e => console.log(e));
        video.addEventListener('loadedmetadata', () => {
            const aspect = video.videoHeight / video.videoWidth;
            container.style.height = (container.clientWidth * aspect) + "px";
            statusText.innerText = "준비 완료! 책장을 비추고 [사진 찍기]를 누르세요.";
        });
    } else {
        statusText.innerHTML = "<span style='color:red;'>카메라 권한 거부됨.</span>";
    }
}

initCamera();

window.addEventListener('resize', () => {
    if (video.videoWidth) {
        const aspect = video.videoHeight / video.videoWidth;
        container.style.height = (container.clientWidth * aspect) + "px";
    }
});

captureBtn.addEventListener('click', captureSnapshot);
searchBtn.addEventListener('click', extractAllText);
resetBtn.addEventListener('click', resetToCamera);

// 텍스트 검출용 흑백 고대비 필터
function enhanceTextContrast(context, width, height) {
    const imageData = context.getImageData(0, 0, width, height);
    const data = imageData.data;
    for (let i = 0; i < data.length; i += 4) {
        const gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
        const v = (gray > 120) ? 255 : 0; // 이진화 경계선 조절
        data[i] = v; data[i+1] = v; data[i+2] = v;
    }
    context.putImageData(imageData, 0, 0);
}

function captureSnapshot() {
    if (!video.videoWidth) { alert("카메라 준비 중입니다."); return; }
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    capturedImageElement = new Image();
    capturedImageElement.src = canvas.toDataURL('image/jpeg', 1.0);
    canvas.style.display = "block";

    captureBtn.style.display = "none";
    searchBtn.style.display = "inline-block";
    resetBtn.style.display = "inline-block";
    statusText.innerHTML = "📸 사진이 고정되었습니다. <br><b>[전체 책 제목 추출]</b> 버튼을 누르세요.";
}

// 사진 속 글자들을 전부 분석하여 리스트로 나열하는 함수
async function extractAllText() {
    searchBtn.disabled = true;
    resetBtn.disabled = true;
    searchBtn.textContent = "글자 읽는 중...";
    statusText.innerHTML = `⚙️ 자체 OCR 엔진으로 이미지 전체의 텍스트를 판독하고 있습니다...`;

    // 리스트 초기화 및 숨김
    bookList.innerHTML = "";
    resultBox.style.display = "none";

    const ocrCanvas = document.createElement('canvas');
    ocrCanvas.width = canvas.width; ocrCanvas.height = canvas.height;
    const ocrCtx = ocrCanvas.getContext('2d');
    ocrCtx.drawImage(capturedImageElement, 0, 0, ocrCanvas.width, ocrCanvas.height);
    enhanceTextContrast(ocrCtx, ocrCanvas.width, ocrCanvas.height);

    try {
        const worker = await Tesseract.createWorker(['kor', 'eng']);
        const ret = await worker.recognize(ocrCanvas);
        const lines = ret.data.lines; // 단어 조각 대신 '줄(Line)' 단위로 가져와 결합력 향상
        await worker.terminate();

        const detectedTitles = [];

        if (lines && lines.length > 0) {
            lines.forEach(line => {
                // 의미 없는 공백 및 특수문자 단독 무리 필터링
                const cleanText = line.text.trim();
                
                // 글자 수가 너무 적거나 깨진 기호 문자 필터 조건문
                if (cleanText.length > 1 && !/^[^ㄱ-ㅎㅏ-ㅣ가-힣a-zA-Z0-9]+$/.test(cleanText)) {
                    detectedTitles.push(cleanText);
                }
            });
        }

        if (detectedTitles.length > 0) {
            statusText.innerHTML = `🎯 총 <b>${detectedTitles.length}개</b>의 텍스트 영역을 검출했습니다.`;
            
            // 중복 제거 후 리스트에 삽입
            const uniqueTitles = [...new Set(detectedTitles)];
            uniqueTitles.forEach(title => {
                const li = document.createElement('li');
                li.innerText = "📖 " + title;
                bookList.appendChild(li);
            });
            
            resultBox.style.display = "block"; // 결과 창 표시
        } else {
            statusText.innerHTML = `❌ <span style='color:#e74c3c; font-weight:bold;'>인식된 글자가 없습니다. 더 밝고 가까운 위치에서 찍어보세요.</span>`;
        }

    } catch (error) {
        console.error(error);
        statusText.innerHTML = `<span style='color:red;'>오류 발생: ${error.message}</span>`;
    } finally {
        searchBtn.disabled = false;
        resetBtn.disabled = false;
        searchBtn.textContent = "🔍 전체 책 제목 추출";
    }
}

function resetToCamera() {
    capturedImageElement = null;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvas.style.display = "none";
    resultBox.style.display = "none";
    bookList.innerHTML = "";

    captureBtn.style.display = "inline-block";
    searchBtn.style.display = "none";
    resetBtn.style.display = "none";
    statusText.innerText = "카메라 재개됨. 새로운 책장을 찍어보세요.";
}
</script>
</body>
</html>
