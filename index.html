<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>도서 자동 추출기 (일회성 입력 보안 버전)</title>
<style>
:root {
--primary-color: #3498db;
--search-color: #9b59b6;
--reset-color: #e74c3c;
--bg-color: #f5f6fa;
--container-bg: #ffffff;
--text-color: #2f3640;
}

body {
font-family: 'Noto Sans KR', sans-serif;
background-color: var(--bg-color);
margin: 0;
padding: 15px;
color: var(--text-color);
display: flex;
flex-direction: column;
align-items: center;
}

h1 {
font-size: 1.4rem;
color: #1abc9c;
margin-bottom: 15px;
text-align: center;
}

.control-box {
width: 100%;
max-width: 500px;
display: flex;
flex-direction: column;
gap: 10px;
margin-bottom: 15px;
box-sizing: border-box;
}

.input-row {
  display: flex;
  width: 100%;
  gap: 8px;
}

input {
flex: 1;
padding: 10px 15px;
font-size: 0.95rem;
border: 2px solid #ced4da;
border-radius: 30px;
outline: none;
box-sizing: border-box;
}

input:focus { border-color: var(--primary-color); }

.btn {
padding: 12px 20px;
font-size: 0.95rem;
font-weight: bold;
color: #fff;
border: none;
border-radius: 30px;
cursor: pointer;
white-space: nowrap;
flex: 1;
transition: background-color 0.2s;
}

.btn:disabled { background-color: #95a5a6; cursor: not-allowed; }

#capture-btn { background-color: var(--primary-color); }
#search-btn { background-color: var(--search-color); display: none; }
#reset-btn { background-color: var(--reset-color); display: none; }

#display-container {
position: relative;
width: 100%;
max-width: 500px;
border-radius: 12px;
overflow: hidden;
box-shadow: 0 8px 20px rgba(0,0,0,0.15);
background-color: #000;
margin-bottom: 15px;
}

video, canvas {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
}

video { object-fit: contain; }
canvas { object-fit: contain; z-index: 1; display: none; }

#status-panel {
width: 100%;
max-width: 500px;
background: var(--container-bg);
padding: 12px 15px;
border-radius: 10px;
border: 1px solid #dcdde1;
box-sizing: border-box;
font-size: 0.9rem;
text-align: center;
margin-bottom: 15px;
}

#result-box {
width: 100%;
max-width: 500px;
background: #ffffff;
border: 2px solid #1abc9c;
border-radius: 12px;
padding: 15px;
box-sizing: border-box;
display: none;
}

#result-box h3 {
margin-top: 0;
margin-bottom: 10px;
font-size: 1.1rem;
color: #1abc9c;
border-bottom: 1px solid #eee;
padding-bottom: 5px;
}

#book-list {
list-style: none;
padding-left: 0;
margin: 0;
text-align: left;
max-height: 250px;
overflow-y: auto;
}

#book-list li {
padding: 8px 10px;
border-bottom: 1px dashed #f1f2f6;
font-size: 0.95rem;
color: #333;
}
</style>
</head>
<body>

<h1>📚 도서 제목 추출기 (Gemini API)</h1>

<div class="control-box">
    <div class="input-row">
        <input type="password" id="api-key-input" autocomplete="new-password" placeholder="Gemini API Key를 입력하세요">
    </div>
    <div class="input-row" id="btn-group">
        <button id="capture-btn" class="btn">📸 사진 찍기</button>
        <button id="search-btn" class="btn">🔍 사진 속 모든 책 추출</button>
        <button id="reset-btn" class="btn">🔄 다시 찍기</button>
    </div>
</div>

<div id="display-container">
<video id="webcam" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>
</div>

<div id="status-panel">
<div id="status-text">카메라 연결을 준비 중입니다...</div>
</div>

<div id="result-box">
    <h3>📋 분석된 도서 목록</h3>
    <ul id="book-list"></ul>
</div>

<script>
const container = document.getElementById('display-container');
const video = document.getElementById('webcam');
const canvas = document.getElementById('overlay');
const ctx = canvas.getContext('2d');
const apiKeyInput = document.getElementById('api-key-input');
const captureBtn = document.getElementById('capture-btn');
const searchBtn = document.getElementById('search-btn');
const resetBtn = document.getElementById('reset-btn');
const statusText = document.getElementById('status-text');
const resultBox = document.getElementById('result-box');
const bookList = document.getElementById('book-list');

let capturedBase64 = null;

// [보안 삭제] window 로드 시 localStorage에서 불러오는 코드 완전 제거
// [보안 삭제] input 입력 시 localStorage에 저장하는 코드 완전 제거

async function initCamera() {
    statusText.innerText = "카메라를 연결하는 중...";
    const constraintsOptions = [
        { video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } },
        { video: { facingMode: "environment" } },
        { video: true }
    ];

    let stream = null;
    for (let currentConstraints of constraintsOptions) {
        try {
            stream = await navigator.mediaDevices.getUserMedia(currentConstraints);
            if (stream) break;
        } catch (e) {
            console.warn("카메라 초기화 실패:", e);
        }
    }

    if (stream) {
        video.srcObject = stream;
        video.play().catch(e => console.log(e));
        video.addEventListener('loadedmetadata', () => {
            const aspect = video.videoHeight / video.videoWidth;
            container.style.height = (container.clientWidth * aspect) + "px";
            statusText.innerText = "준비 완료! API Key 입력 후 [사진 찍기]를 누르세요.";
        });
    } else {
        statusText.innerHTML = "<span style='color:red;'>카메라 권한 거부됨.</span>";
    }
}

initCamera();

captureBtn.addEventListener('click', captureSnapshot);
searchBtn.addEventListener('click', extractAllBooks);
resetBtn.addEventListener('click', resetToCamera);

function captureSnapshot() {
    if (!video.videoWidth) { alert("카메라 준비 중입니다."); return; }
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    capturedBase64 = canvas.toDataURL('image/jpeg', 1.0).split(',')[1];
    canvas.style.display = "block";

    captureBtn.style.display = "none";
    searchBtn.style.display = "inline-block";
    resetBtn.style.display = "inline-block";
    statusText.innerHTML = "📸 사진 촬영 완료! <br>[사진 속 모든 책 추출] 버튼을 누르세요.";
}

async function extractAllBooks() {
    // 버튼을 누른 이 시점 인풋창에 적혀있는 값만 딱 한 번 가져와 메모리에서 쓰고 버립니다.
    const apiKey = apiKeyInput.value.trim();
    if (!apiKey) { alert("Gemini API 키를 입력하세요."); apiKeyInput.focus(); return; }

    searchBtn.disabled = true;
    resetBtn.disabled = true;
    searchBtn.textContent = "AI 분석 중...";
    statusText.innerHTML = `🧠 구글 AI가 사진 안의 모든 도서명을 분석하고 있습니다...`;
    
    bookList.innerHTML = "";
    resultBox.style.display = "none";

    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
    
    const prompt = `주어진 이미지에서 책장에 꽂혀 있는 모든 책의 제목(도서명)을 찾아서 리스트업해줘. 
출력은 다른 부가 설명문구나 코드 블록 없이 무조건 아래의 JSON 규격으로만 응답해줘:
{"books": ["책제목1", "책제목2", "책제목3"]}`;

    const payload = {
        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: capturedBase64 } }] }],
        generationConfig: { responseMimeType: "application/json" }
    };

    try {
        const response = await fetch(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error(`서버 에러 (${response.status})`);

        const data = await response.json();
        let textResponse = data.candidates[0].content.parts[0].text;
        textResponse = textResponse.replace(/```json|```/g, '').trim();

        const result = JSON.parse(textResponse);

        if (result.books && result.books.length > 0) {
            statusText.innerHTML = `🎯 총 <b>${result.books.length}권</b>의 책을 찾았습니다.`;
            result.books.forEach(title => {
                const li = document.createElement('li');
                li.innerText = "📖 " + title;
                bookList.appendChild(li);
            });
            resultBox.style.display = "block";
        } else {
            statusText.innerHTML = `❌ 글자가 식별된 책을 발견하지 못했습니다.`;
        }

    } catch (error) {
        console.error(error);
        statusText.innerHTML = `<span style='color:red;'>오류 발생: ${error.message}</span>`;
    } finally { // 누락되었던 문법 에러 수정 완료
        searchBtn.disabled = false;
        resetBtn.disabled = false;
        searchBtn.textContent = "🔍 사진 속 모든 책 추출";
    }
}

function resetToCamera() {
    capturedBase64 = null;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvas.style.display = "none";
    resultBox.style.display = "none";
    captureBtn.style.display = "inline-block";
    searchBtn.style.display = "none";
    resetBtn.style.display = "none";
    statusText.innerText = "카메라 준비됨. [사진 찍기]를 누르세요.";
}
</script>
</body>
</html>
