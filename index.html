<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>도서 위치 스냅샷 검색기 (고해상도 & API 고정 패치)</title>
<style>
:root {
--primary-color: #3498db;
--search-color: #2ecc71;
--reset-color: #e74c3c;
--bg-color: #f5f6fa;
--container-bg: #ffffff;
--text-color: #2f3640;
}

body {
font-family: 'Noto Sans KR', sans-serif;
background-color: var(--bg-color);
margin: 0;
padding: 15px;
color: var(--text-color);
display: flex;
flex-direction: column;
align-items: center;
}

h1 {
font-size: 1.4rem;
color: #1abc9c;
margin-bottom: 15px;
text-align: center;
}

.control-box {
width: 100%;
max-width: 500px;
display: flex;
flex-direction: column;
gap: 10px;
margin-bottom: 15px;
box-sizing: border-box;
}

.input-row {
display: flex;
width: 100%;
gap: 8px;
}

input {
flex: 1;
padding: 10px 15px;
font-size: 0.95rem;
border: 2px solid #ced4da;
border-radius: 30px;
outline: none;
box-sizing: border-box;
}

input:focus { border-color: var(--primary-color); }

#api-key-input {
border-color: #34495e;
background-color: #f8f9fa;
}

.btn {
padding: 10px 20px;
font-size: 0.95rem;
font-weight: bold;
color: #fff;
border: none;
border-radius: 30px;
cursor: pointer;
white-space: nowrap;
flex: 1;
transition: background-color 0.2s;
}

.btn:disabled { background-color: #95a5a6; cursor: not-allowed; }

#capture-btn { background-color: var(--primary-color); }
#search-btn { background-color: var(--search-color); display: none; }
#reset-btn { background-color: var(--reset-color); display: none; }

#display-container {
position: relative;
width: 100%;
max-width: 500px;
aspect-ratio: 4 / 3;
border-radius: 12px;
overflow: hidden;
box-shadow: 0 8px 20px rgba(0,0,0,0.15);
background-color: #000;
}

video, canvas {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
object-fit: cover;
}

canvas {
z-index: 1;
display: none;
}

#status-panel {
width: 100%;
max-width: 500px;
margin-top: 12px;
background: var(--container-bg);
padding: 12px 15px;
border-radius: 10px;
border: 1px solid #dcdde1;
box-sizing: border-box;
font-size: 0.9rem;
text-align: center;
}

.highlight { color: #e74c3c; font-weight: bold; }
</style>
</head>
<body>

<h1>🔍 도서 위치 검색기 (고해상도 패치)</h1>

<div class="control-box">
    <div class="input-row">
        <input type="text" id="api-key-input" placeholder="Gemini API Key를 입력하세요">
    </div>
    <div class="input-row">
        <input type="text" id="book-input" placeholder="책 제목 입력 (예: 완득이)">
    </div>
    <div class="input-row" id="btn-group">
        <button id="capture-btn" class="btn">📸 사진 찍기</button>
        <button id="search-btn" class="btn">🔍 책 찾기</button>
        <button id="reset-btn" class="btn">🔄 다시 찍기</button>
    </div>
</div>

<div id="display-container">
<video id="webcam" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>
</div>

<div id="status-panel">
<div id="status-text">카메라를 켜는 중입니다...</div>
</div>

<script>
const video = document.getElementById('webcam');
const canvas = document.getElementById('overlay');
const ctx = canvas.getContext('2d');

const apiKeyInput = document.getElementById('api-key-input');
const bookInput = document.getElementById('book-input');

const captureBtn = document.getElementById('capture-btn');
const searchBtn = document.getElementById('search-btn');
const resetBtn = document.getElementById('reset-btn');
const statusText = document.getElementById('status-text');

let capturedBase64 = null;

// [개선 1] 페이지가 로드되자마자 즉시 로컬 스토리지에서 API 키를 안전하게 불러와 배치
window.addEventListener('DOMContentLoaded', () => {
    const savedKey = localStorage.getItem('gemini_api_key');
    if (savedKey) {
        apiKeyInput.value = savedKey;
    }
});

// [개선 2] 입력할 때마다 실시간으로 로컬 스토리지에 강제 동기화 (두 번째 입력 유실 원천 차단)
apiKeyInput.addEventListener('input', () => {
    localStorage.setItem('gemini_api_key', apiKeyInput.value.trim());
});

// [개선 3] 고해상도 카메라(FHD급) 최우선 요청 설정
async function initCamera() {
    statusText.innerText = "카메라를 연결하는 중...";
    const constraintsOptions = [
        // 1순위: Full HD (1080p) 후면 카메라 강제 타겟팅
        { video: { facingMode: { exact: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } } },
        // 2순위: 일반 후면 카메라 고화질 유도
        { video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } },
        // 3순위: 기본 장치 허용
        { video: true }
    ];

    let stream = null;
    for (let currentConstraints of constraintsOptions) {
        try {
            stream = await navigator.mediaDevices.getUserMedia(currentConstraints);
            if (stream) break;
        } catch (e) {
            console.warn("선택된 카메라 옵션 실패, 대안 시도:", e);
        }
    }

    if (stream) {
        video.srcObject = stream;
        video.play().catch(e => console.log(e));
        video.addEventListener('loadedmetadata', () => {
            // 실제 카메라의 하드웨어 해상도 그대로 캔버스 크기를 매칭 (화질 저하 방지)
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            statusText.innerText = "준비 완료! 책장을 비추고 [사진 찍기]를 누르세요.";
        });
    } else {
        statusText.innerHTML = "<span style='color:red;'>카메라 권한을 획득하지 못했습니다. 설정에서 확인하세요.</span>";
    }
}

initCamera();

captureBtn.addEventListener('click', captureSnapshot);
searchBtn.addEventListener('click', searchBookInSnapshot);
resetBtn.addEventListener('click', resetToCamera);
bookInput.addEventListener('keypress', (e) => { if(e.key === 'Enter' && searchBtn.style.display !== 'none') searchBookInSnapshot(); });

// [기능 1] 고화질 스냅샷 촬영 및 화면 고정
function captureSnapshot() {
    if (!video.videoWidth) { alert("카메라 화면이 아직 준비되지 않았습니다."); return; }
    
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // 원본 비디오 해상도 그대로 1:1 드로잉 (품질 보존)
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    // 이미지 파일 압축률 최하(1.0)로 설정하여 선명한 품질 유지
    capturedBase64 = canvas.toDataURL('image/jpeg', 1.0).split(',')[1];

    canvas.style.display = "block";

    captureBtn.style.display = "none";
    searchBtn.style.display = "inline-block";
    resetBtn.style.display = "inline-block";

    statusText.innerHTML = "📸 고해상도 사진 촬영 완료! <br>이제 검색할 <b>책 제목</b>을 적고 <b>[책 찾기]</b>를 누르세요.";
}

// [기능 2] 찍은 사진 바탕으로 정밀 OCR 검출 시도
async function searchBookInSnapshot() {
    const apiKey = apiKeyInput.value.trim();
    const targetTitle = bookInput.value.trim();

    if (!apiKey) { alert("Gemini API 키를 입력하세요."); apiKeyInput.focus(); return; }
    if (!targetTitle) { alert("책 제목을 입력하세요."); bookInput.focus(); return; }

    // 다시 한 번 저장 검증
    localStorage.setItem('gemini_api_key', apiKey);

    searchBtn.disabled = true;
    resetBtn.disabled = true;
    searchBtn.textContent = "OCR 판별 중...";
    statusText.innerHTML = `<span class='highlight'>"${targetTitle}"</span> 텍스트 및 위치를 정밀 추적 중...`;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const img = new Image();
    img.src = "data:image/jpeg;base64," + capturedBase64;
    img.onload = async function() {
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        await callGeminiAPI(apiKey, targetTitle);
    };
}

// [기능 3] 정밀한 OCR 영역 획득을 위한 전용 프롬프트 파트
async function callGeminiAPI(apiKey, targetTitle) {
    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

    // SAM2 같은 세그멘테이션 없이, 텍스트의 바운딩박스 정밀 검출에 특화되도록 프롬프트 강화
    const prompt = `주어진 고해상도 이미지에서 시각적 OCR을 정밀하게 수행하여, 표지나 책등에 문자로 "${targetTitle}"이(가) 인쇄되어 있는 정확한 위치를 검출해 주세요.
글자 텍스트 자수 영역에 정확히 밀착된 단 하나의 경계 상자(Bounding Box) 좌표를 [ymin, xmin, ymax, xmax] 형태로 계산해야 합니다.
좌표값은 이미지의 세로, 가로 크기를 기준으로 0에서 1000 사이의 숫자로 완벽히 정규화(Normalized)하세요.

출력은 다른 설명문구나 마크다운 코드블록(\`\`\`)을 일절 배제하고 오직 규격화된 아래의 JSON 데이터 포맷 하나만 반환하세요:
{"found": true, "box": [ymin, xmin, ymax, xmax]}
만약 이미지 내에 해당 글자가 인쇄된 도서가 결단코 존재하지 않는다면 다음 포맷으로만 출력하세요:
{"found": false}`;

    const payload = {
        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: capturedBase64 } }] }],
        generationConfig: { responseMimeType: "application/json", temperature: 0.1 } // 난수성을 낮춰 정확도 수렴 유도
    };

    try {
        const response = await fetch(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error(`서버 에러 (${response.status})`);

        const data = await response.json();
        let textResponse = data.candidates[0].content.parts[0].text;
        textResponse = textResponse.replace(/```json|```/g, '').trim();

        const result = JSON.parse(textResponse);

        if (result.found && result.box) {
            statusText.innerHTML = `🎯 <span style='color:#2ecc71; font-weight:bold;'>"${targetTitle}"</span> 문자를 찾아냈습니다!`;
            drawTargetUI(result.box);
        } else {
            statusText.innerHTML = `❌ <span style='color:#e74c3c; font-weight:bold;'>해당 글자가 포함된 책을 찾을 수 없습니다.</span>`;
            drawNotFoundUI();
        }

    } catch (error) {
        console.error(error);
        statusText.innerHTML = `<span style='color:red;'>오류 발생: ${error.message}</span>`;
    } finally {
        searchBtn.disabled = false;
        resetBtn.disabled = false;
        searchBtn.textContent = "🔍 책 찾기";
    }
}

function resetToCamera() {
    capturedBase64 = null;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvas.style.display = "none";

    captureBtn.style.display = "inline-block";
    searchBtn.style.display = "none";
    resetBtn.style.display = "none";

    statusText.innerText = "카메라 준비됨. [사진 찍기]를 누르세요.";
}

function drawTargetUI(box) {
    const ymin = (box[0] / 1000) * canvas.height;
    const xmin = (box[1] / 1000) * canvas.width;
    const ymax = (box[2] / 1000) * canvas.height;
    const xmax = (box[3] / 1000) * canvas.width;

    const boxWidth = xmax - xmin;
    const centerX = xmin + (boxWidth / 2);
    const targetTopY = ymin - 8;

    // 타겟 상자 디자인 정밀화 (OCR 느낌으로 두께감 조정)
    ctx.strokeStyle = '#2ecc71';
    ctx.lineWidth = 6;
    ctx.strokeRect(xmin, ymin, boxWidth, ymax - ymin);

    // 모서리 십자 가이드 추가 (정밀 판별 느낌 부여)
    ctx.fillStyle = '#2ecc71';
    ctx.fillRect(xmin-10, ymin-3, 20, 6);
    ctx.fillRect(xmin-3, ymin-10, 6, 20);
    ctx.fillRect(xmax-10, ymax-3, 20, 6);
    ctx.fillRect(xmax-3, ymax-10, 6, 20);

    // 상단 지시용 화살표
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath();
    ctx.moveTo(centerX - 15, targetTopY - 25);
    ctx.lineTo(centerX + 15, targetTopY - 25);
    ctx.lineTo(centerX, targetTopY);
    ctx.closePath();
    ctx.fill();
}

function drawNotFoundUI() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#e74c3c';
    ctx.font = 'bold 26px "Noto Sans KR", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('해당 책이 없습니다 ❌', canvas.width / 2, canvas.height / 2);
}
</script>
</body>
</html>
