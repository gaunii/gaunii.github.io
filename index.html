<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>정밀 도서 위치 검색기</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0; padding: 16px; background-color: #f5f7fa; color: #333;
      display: flex; flex-direction: column; align-items: center;
    }
    h2 { font-size: 1.2rem; margin-bottom: 12px; color: #2c3e50; }
    .setup-box, .search-box {
      width: 100%; max-width: 450px; background: white; 
      padding: 16px; border-radius: 12px; margin-bottom: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05); box-sizing: border-box;
    }
    input {
      width: 100%; padding: 10px; margin: 6px 0; 
      border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;
    }
    button {
      width: 100%; padding: 12px; border: none; border-radius: 6px;
      font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 6px;
    }
    .btn-snap { background-color: #4CAF50; color: white; }
    .btn-search { background-color: #2196F3; color: white; }
    button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
    
    .viewer-container {
      position: relative; width: 100%; max-width: 450px; 
      border-radius: 12px; overflow: hidden; display: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }
    video, canvas { width: 100%; height: auto; display: block; }
    
    /* 정밀 다각형 마스크 레이어 */
    .precision-mask {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; background-color: rgba(0, 255, 120, 0.45);
      mix-blend-mode: multiply; clip-path: polygon(0 0, 0 0, 0 0, 0 0);
      will-change: clip-path; transition: clip-path 0.35s ease-out;
    }
    .status { margin-top: 8px; font-size: 0.9rem; font-weight: bold; color: #e74c3c; }
  </style>
</head>
<body>

  <h2>📚 도서 위치 검색기 (정밀 마스킹 뷰)</h2>

  <div class="setup-box">
    <input type="password" id="apiKey" placeholder="Gemini API Key를 입력하세요">
    <button class="btn-snap" onclick="initCamera()">📷 카메라 켜기</button>
  </div>

  <div class="search-box">
    <input type="text" id="targetWord" placeholder="찾을 책 제목 (예: 머리카락)" value="머리카락">
    <button class="btn-search" id="actionBtn" onclick="captureAndSearch()" disabled>🎯 사진 찍고 책 찾기</button>
    <div class="status" id="statusText">카메라를 먼저 활성화해주세요.</div>
  </div>

  <div class="viewer-container" id="viewer">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display: none;"></canvas>
    <div class="precision-mask" id="mask"></div>
  </div>

  <script>
    let streamRef = null;
    let isProcessing = false; // 중복 호출 방지용 플래그
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const mask = document.getElementById('mask');
    const statusText = document.getElementById('statusText');
    const actionBtn = document.getElementById('actionBtn');

    // [카메라 초기화]
    async function initCamera() {
      try {
        if (streamRef) {
          streamRef.getTracks().forEach(track => track.stop());
        }
        streamRef = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } },
          audio: false
        });
        video.srcObject = streamRef;
        document.getElementById('viewer').style.display = 'block';
        actionBtn.disabled = false;
        statusText.innerText = "카메라 준비 완료. 책장을 정면에서 촬영하세요.";
        statusText.style.color = "#2ecc71";
      } catch (err) {
        console.error(err);
        statusText.innerText = "카메라 권한 오류: " + err.message;
      }
    }

    // [촬영 및 Gemini API 호출]
    async function captureAndSearch() {
      if (isProcessing) return; // 이미 처리 중이면 대기

      const apiKey = document.getElementById('apiKey').value.trim();
      const targetWord = document.getElementById('targetWord').value.trim();
      
      if (!apiKey) { alert("API Key를 입력해주세요."); return; }
      if (!targetWord) { alert("검색할 단어를 입력해주세요."); return; }

      // UI 락 가동
      isProcessing = true;
      actionBtn.disabled = true;
      statusText.innerText = "이미지 분석 중... 잠시만 기다려주세요.";
      statusText.style.color = "#3498db";
      mask.style.clipPath = "polygon(0 0, 0 0, 0 0, 0 0)"; 

      // 1. 비디오 화면 캡처
      const ctx = canvas.getContext('2d');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const base64Image = canvas.toDataURL('image/jpeg').split(',')[1];

      // 2. 구조화된 출력 스키마 정의
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
      const payload = {
        contents: [{
          parts: [
            { text: `이 이미지에서 '${targetWord}'라는 글자가 적힌 정확한 영역을 찾으세요. 이미지의 좌측 상단을 (0,0), 우측 하단을 (1,1)로 정규화합니다. 글자가 기울어진 각도 그대로 딱 맞게 감싸는 4개의 꼭짓점 좌표(Polygon)를 반환하세요.` },
            { inlineData: { mimeType: "image/jpeg", data: base64Image } }
          ]
        }],
        generationConfig: {
          responseMimeType: "application/json",
          responseSchema: {
            type: "OBJECT",
            properties: {
              target_found: { type: "BOOLEAN" },
              polygon: {
                type: "ARRAY",
                items: {
                  type: "OBJECT",
                  properties: {
                    x: { type: "NUMBER" },
                    y: { type: "NUMBER" }
                  },
                  required: ["x", "y"]
                }
              }
            },
            required: ["target_found", "polygon"]
          },
          temperature: 0.1
        }
      };

      // 3. API 호출 파트
      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        if (!response.ok) {
          throw new Error(`API 에러 발생 (Status: ${response.status}). 잠시 후 다시 시도해 주세요.`);
        }

        const result = await response.json();
        const jsonText = result.candidates[0].content.parts[0].text;
        const data = JSON.parse(jsonText);

        if (data.target_found && data.polygon && data.polygon.length === 4) {
          // 비디오 정지 (화면 얼림)
          video.pause();
          
          // %값으로 변환하여 CSS에 주입
          const points = data.polygon.map(p => `${(p.x * 100).toFixed(2)}% ${(p.y * 100).toFixed(2)}%`).join(', ');
          mask.style.clipPath = `polygon(${points})`;
          
          statusText.innerText = `"${targetWord}" 위치를 성공적으로 마스킹했습니다!`;
          statusText.style.color = "#2ecc71";
          
          // [해결 포인트] 다시 촬영 버튼 활성화 및 안전한 카메라 재개 세팅
          actionBtn.disabled = false;
          actionBtn.innerText = "🔄 다시 찍기";
          actionBtn.onclick = async () => {
            actionBtn.disabled = true; // 렌즈가 깨어나는 동안 버튼 임시 잠금
            mask.style.clipPath = "polygon(0 0, 0 0, 0 0, 0 0)"; // 마스크 초기화
            
            await video.play(); // 카메라 다시 재생
            
            // 💡 렌즈가 완전히 열리고 버퍼가 채워질 수 있도록 500ms 지연 시간을 줌
            setTimeout(() => {
              actionBtn.innerText = "🎯 사진 찍고 책 찾기";
              actionBtn.onclick = captureAndSearch;
              actionBtn.disabled = false;
              isProcessing = false; // 플래그 해제
              statusText.innerText = "카메라가 다시 활성화되었습니다. 촬영해 보세요.";
              statusText.style.color = "#2ecc71";
            }, 500);
          };
        } else {
          statusText.innerText = `이미지 내에서 "${targetWord}" 단어를 찾지 못했습니다.`;
          statusText.style.color = "#e74c3c";
          resetControlState();
        }
      } catch (err) {
        console.error(err);
        statusText.innerText = err.message || "분석 실패";
        statusText.style.color = "#e74c3c";
        resetControlState();
      }
    }

    // 에러 발생 시 UI 상태 초기화용 공통 유틸 함수
    function resetControlState() {
      isProcessing = false;
      actionBtn.disabled = false;
      actionBtn.innerText = "🎯 사진 찍고 책 찾기";
      actionBtn.onclick = captureAndSearch;
    }
  </script>
</body>
</html>
