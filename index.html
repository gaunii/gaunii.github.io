<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>도서 위치 스냅샷 검색기</title>
<style>
:root {
--primary-color: #2ecc71;
--accent-color: #e74c3c;
--reset-color: #34495e;
--bg-color: #f5f6fa;
--container-bg: #ffffff;
--text-color: #2f3640;
}

body {
font-family: 'Noto Sans KR', sans-serif;
background-color: var(--bg-color);
margin: 0;
padding: 15px;
color: var(--text-color);
display: flex;
flex-direction: column;
align-items: center;
}

h1 {
font-size: 1.4rem;
color: #1abc9c;
margin-bottom: 15px;
text-align: center;
}

.control-box {
width: 100%;
max-width: 500px;
display: flex;
flex-direction: column;
gap: 10px;
margin-bottom: 15px;
box-sizing: border-box;
}

.input-row {
display: flex;
width: 100%;
gap: 8px;
}

input {
flex: 1;
padding: 10px 15px;
font-size: 0.95rem;
border: 2px solid #ced4da;
border-radius: 30px;
outline: none;
box-sizing: border-box;
}

input:focus { border-color: var(--primary-color); }

#api-key-input {
border-color: #34495e;
background-color: #f8f9fa;
}

#search-btn {
padding: 10px 25px;
font-size: 0.95rem;
font-weight: bold;
color: #fff;
background-color: var(--primary-color);
border: none;
border-radius: 30px;
cursor: pointer;
white-space: nowrap;
}

/* 초기화 버튼용 스타일 */
#search-btn.reset-mode {
background-color: var(--reset-color);
}

#search-btn:disabled { background-color: #95a5a6; }

#display-container {
position: relative;
width: 100%;
max-width: 500px;
aspect-ratio: 4 / 3;
border-radius: 12px;
overflow: hidden;
box-shadow: 0 8px 20px rgba(0,0,0,0.15);
background-color: #000;
}

video, canvas {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
object-fit: cover;
}

#status-panel {
width: 100%;
max-width: 500px;
margin-top: 12px;
background: var(--container-bg);
padding: 12px 15px;
border-radius: 10px;
border: 1px solid #dcdde1;
box-sizing: border-box;
font-size: 0.9rem;
text-align: center;
}

.highlight { color: var(--accent-color); font-weight: bold; }
</style>
</head>
<body>

<h1>🔍 도서 위치 검색기 (스냅샷 방식)</h1>

<div class="control-box">
    <div class="input-row">
        <input type="password" id="api-key-input" placeholder="Gemini API Key를 입력하세요">
    </div>
    <div class="input-row">
        <input type="text" id="book-input" placeholder="책 제목 입력 (예: 완득이)">
        <button id="search-btn">찾기</button>
    </div>
</div>

<div id="display-container">
<video id="webcam" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>
</div>

<div id="status-panel">
<div id="status-text">API 키와 책 이름을 입력 후 [찾기]를 누르세요.</div>
</div>

<script>
const video = document.getElementById('webcam');
const canvas = document.getElementById('overlay');
const ctx = canvas.getContext('2d');
const apiKeyInput = document.getElementById('api-key-input');
const bookInput = document.getElementById('book-input');
const searchBtn = document.getElementById('search-btn');
const statusText = document.getElementById('status-text');

// 현재 '초기화(리셋)' 대기 상태인지 체크하는 플래그
let isResetMode = false;

if (localStorage.getItem('gemini_api_key')) {
    apiKeyInput.value = localStorage.getItem('gemini_api_key');
}

// 카메라 권한 및 초기화
async function initCamera() {
    const constraintsOptions = [
        { video: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 480 } } },
        { video: { facingMode: "environment" } },
        { video: true }
    ];

    let stream = null;
    for (let currentConstraints of constraintsOptions) {
        try {
            stream = await navigator.mediaDevices.getUserMedia(currentConstraints);
            if (stream) break;
        } catch (e) {
            console.warn("카메라 로드 실패, 다음 옵션 시도:", e);
        }
    }

    if (stream) {
        video.srcObject = stream;
        video.play().catch(e => console.log(e));

        video.addEventListener('loadedmetadata', () => {
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
        });
    } else {
        statusText.innerHTML = "<span style='color:red;'>카메라 권한이 거부되었거나 장치를 찾을 수 없습니다.</span>";
    }
}

initCamera();

// 이벤트 연결
bookInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleAction(); });
apiKeyInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleAction(); });
searchBtn.addEventListener('click', handleAction);

// 버튼 클릭 시 [찾기] 또는 [다시 찾기(초기화)] 분기 처리
function handleAction() {
    if (isResetMode) {
        resetApp();
    } else {
        captureAndSearch();
    }
}

// [1] 사진 찍고 분석 요청하는 함수
async function captureAndSearch() {
    const apiKey = apiKeyInput.value.trim();
    const targetTitle = bookInput.value.trim();

    if (!apiKey) { alert("Gemini API 키를 입력하세요."); apiKeyInput.focus(); return; }
    if (!targetTitle) { alert("책 제목을 입력하세요."); bookInput.focus(); return; }

    localStorage.setItem('gemini_api_key', apiKey);

    // 버튼 잠금 및 상태 표시
    searchBtn.disabled = true;
    searchBtn.textContent = "분석 중...";
    statusText.innerHTML = `<span class='highlight'>"${targetTitle}"</span> 찾는 중... 잠시만 기다려주세요.`;
    
    // 캔버스 깨끗하게 초기화
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 현재 카메라 화면을 캡처해서 Base64 이미지 데이터로 변환
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = video.videoWidth || 640;
    tempCanvas.height = video.videoHeight || 480;
    tempCanvas.getContext('2d').drawImage(video, 0, 0);
    const base64Image = tempCanvas.toDataURL('image/jpeg').split(',')[1];

    // 사진을 찍은 직후 카메라 화면을 그 자리에 일시정지(Freeze)
    video.pause();

    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

    const prompt = `주어진 이미지에서 책장에 꽂힌 책들 중 제목이 "${targetTitle}"인 도서를 찾아주세요.
만약 해당 도서가 존재한다면 그 책의 영역을 감싸는 경계 상자(Bounding Box) 좌표를 [ymin, xmin, ymax, xmax] 형태로 반환해줘.
좌표 값은 이미지 크기를 기준으로 0에서 1000 사이의 숫자로 정규화(Normalized)해야 해.
출력은 부가 설명이나 코드 블록 없이 무조건 아래 명시된 JSON 형식으로만 응답해줘:
{"found": true, "box": [ymin, xmin, ymax, xmax]} 또는 책을 찾지 못했다면 {"found": false}`;

    const payload = {
        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64Image } }] }],
        generationConfig: { responseMimeType: "application/json" }
    };

    try {
        const response = await fetch(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error(`서버 응답 오류 (${response.status})`);

        const data = await response.json();
        let textResponse = data.candidates[0].content.parts[0].text;
        textResponse = textResponse.replace(/```json|```/g, '').trim();

        const result = JSON.parse(textResponse);

        // 결과에 따른 화면 표시
        if (result.found && result.box) {
            statusText.innerHTML = `🎯 <span style='color:#2ecc71; font-weight:bold;'>"${targetTitle}"</span> 발견!`;
            drawTargetUI(result.box);
        } else {
            statusText.innerHTML = `❌ <span style='color:#e74c3c; font-weight:bold;'>해당 책이 없습니다.</span>`;
            drawNotFoundUI();
        }

        // 성공적으로 완료되면 버튼을 '다시 찾기(초기화)' 상태로 전환
        isResetMode = true;
        searchBtn.textContent = "다시 찾기 (초기화)";
        searchBtn.classList.add('reset-mode');

    } catch (error) {
        console.error(error);
        statusText.innerHTML = `<span style='color:red;'>오류 발생: ${error.message}</span>`;
        // 에러가 나면 다시 카메라를 켜줌
        video.play().catch(e => console.log(e));
    } finally {
        searchBtn.disabled = false;
    }
}

// [2] 초기화 함수 (모든 걸 원상복구하고 카메라를 재개)
function resetApp() {
    isResetMode = false;
    
    // 캔버스 그림 지우기
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 카메라 영상 다시 재생
    video.play().catch(e => console.log(e));

    // 버튼 및 하단 텍스트 UI 원상복구
    searchBtn.textContent = "찾기";
    searchBtn.classList.remove('reset-mode');
    statusText.innerText = "카메라가 재개되었습니다. 책 이름을 입력 후 [찾기]를 누르세요.";
}

// 책을 찾았을 때 스냅샷 화면 위에 사각형 박스 그리기
function drawTargetUI(box) {
    const ymin = (box[0] / 1000) * canvas.height;
    const xmin = (box[1] / 1000) * canvas.width;
    const ymax = (box[2] / 1000) * canvas.height;
    const xmax = (box[3] / 1000) * canvas.width;

    const boxWidth = xmax - xmin;
    const centerX = xmin + (boxWidth / 2);
    const targetTopY = ymin - 8;

    // 초록색 테두리 상자
    ctx.strokeStyle = '#2ecc71';
    ctx.lineWidth = 5;
    ctx.strokeRect(xmin, ymin, boxWidth, ymax - ymin);

    // 상단 빨간색 화살표
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath();
    ctx.moveTo(centerX - 15, targetTopY - 25);
    ctx.lineTo(centerX + 15, targetTopY - 25);
    ctx.lineTo(centerX, targetTopY);
    ctx.closePath();
    ctx.fill();
}

// 책이 없을 때 화면 정중앙에 경고 메시지 그리기
function drawNotFoundUI() {
    // 반투명한 어두운 배경을 살짝 깔아 글씨 가독성 확보
    ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // "해당 책이 없습니다" 텍스트 스타일 설정
    ctx.fillStyle = '#e74c3c';
    ctx.font = 'bold 24px "Noto Sans KR", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    // 캔버스 정중앙에 텍스트 배치
    ctx.fillText('해당 책이 없습니다 ❌', canvas.width / 2, canvas.height / 2);
}
</script>
</body>
</html>
