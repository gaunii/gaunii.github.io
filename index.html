<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>도서 위치 스냅샷 검색기 (무료 오픈소스 OCR 버전)</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
:root {
--primary-color: #3498db;
--search-color: #2ecc71;
--reset-color: #e74c3c;
--bg-color: #f5f6fa;
--container-bg: #ffffff;
--text-color: #2f3640;
}

body {
font-family: 'Noto Sans KR', sans-serif;
background-color: var(--bg-color);
margin: 0;
padding: 15px;
color: var(--text-color);
display: flex;
flex-direction: column;
align-items: center;
}

h1 {
font-size: 1.4rem;
color: #1abc9c;
margin-bottom: 15px;
text-align: center;
}

.control-box {
width: 100%;
max-width: 500px;
display: flex;
flex-direction: column;
gap: 10px;
margin-bottom: 15px;
box-sizing: border-box;
}

.input-row {
  display: flex;
  width: 100%;
  gap: 8px;
}

input {
flex: 1;
padding: 10px 15px;
font-size: 0.95rem;
border: 2px solid #ced4da;
border-radius: 30px;
outline: none;
box-sizing: border-box;
}

input:focus { border-color: var(--primary-color); }

.btn {
padding: 10px 20px;
font-size: 0.95rem;
font-weight: bold;
color: #fff;
border: none;
border-radius: 30px;
cursor: pointer;
white-space: nowrap;
flex: 1;
transition: background-color 0.2s;
}

.btn:disabled { background-color: #95a5a6; cursor: not-allowed; }

#capture-btn { background-color: var(--primary-color); }
#search-btn { background-color: var(--search-color); display: none; }
#reset-btn { background-color: var(--reset-color); display: none; }

#display-container {
position: relative;
width: 100%;
max-width: 500px;
border-radius: 12px;
overflow: hidden;
box-shadow: 0 8px 20px rgba(0,0,0,0.15);
background-color: #000;
}

video, canvas {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
}

video { object-fit: contain; }
canvas { object-fit: contain; z-index: 1; display: none; }

#status-panel {
width: 100%;
max-width: 500px;
margin-top: 12px;
background: var(--container-bg);
padding: 12px 15px;
border-radius: 10px;
border: 1px solid #dcdde1;
box-sizing: border-box;
font-size: 0.9rem;
text-align: center;
}

.highlight { color: #e74c3c; font-weight: bold; }
</style>
</head>
<body>

<h1>🔍 도서 위치 검색기 (로컬 웹 OCR)</h1>

<div class="control-box">
    <div class="input-row">
        <input type="text" id="book-input" placeholder="책 제목 입력 (예: 완득이)">
    </div>
    <div class="input-row" id="btn-group">
        <button id="capture-btn" class="btn">📸 사진 찍기</button>
        <button id="search-btn" class="btn">🔍 책 찾기</button>
        <button id="reset-btn" class="btn">🔄 다시 찍기</button>
    </div>
</div>

<div id="display-container">
<video id="webcam" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>
</div>

<div id="status-panel">
<div id="status-text">카메라 연결을 준비 중입니다...</div>
</div>

<script>
const container = document.getElementById('display-container');
const video = document.getElementById('webcam');
const canvas = document.getElementById('overlay');
const ctx = canvas.getContext('2d');

const bookInput = document.getElementById('book-input');

const captureBtn = document.getElementById('capture-btn');
const searchBtn = document.getElementById('search-btn');
const resetBtn = document.getElementById('reset-btn');
const statusText = document.getElementById('status-text');

let capturedImageElement = null; // 원본 이미지 객체 보관용

// 모바일 카메라 연동
async function initCamera() {
    statusText.innerText = "카메라를 연결하는 중...";
    const constraintsOptions = [
        { video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } },
        { video: { facingMode: "environment" } },
        { video: true }
    ];

    let stream = null;
    for (let currentConstraints of constraintsOptions) {
        try {
            stream = await navigator.mediaDevices.getUserMedia(currentConstraints);
            if (stream) break;
        } catch (e) {
            console.warn("카메라 초기화 시도 실패:", e);
        }
    }

    if (stream) {
        video.srcObject = stream;
        video.play().catch(e => console.log(e));
        
        video.addEventListener('loadedmetadata', () => {
            const aspect = video.videoHeight / video.videoWidth;
            container.style.height = (container.clientWidth * aspect) + "px";
            statusText.innerText = "준비 완료! [사진 찍기]를 누르세요.";
        });
    } else {
        statusText.innerHTML = "<span style='color:red;'>카메라 권한 거부됨.</span>";
    }
}

initCamera();

window.addEventListener('resize', () => {
    if (video.videoWidth) {
        const aspect = video.videoHeight / video.videoWidth;
        container.style.height = (container.clientWidth * aspect) + "px";
    }
});

captureBtn.addEventListener('click', captureSnapshot);
searchBtn.addEventListener('click', searchBookInSnapshot);
resetBtn.addEventListener('click', resetToCamera);

// 1단계: 사진 촬영 및 고정
function captureSnapshot() {
    if (!video.videoWidth) { alert("카메라 준비 중입니다."); return; }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    // OCR 성능 향상을 위해 이미지 객체로 미리 만들어 둡니다.
    capturedImageElement = new Image();
    capturedImageElement.src = canvas.toDataURL('image/jpeg', 1.0);
    
    canvas.style.display = "block";

    captureBtn.style.display = "none";
    searchBtn.style.display = "inline-block";
    resetBtn.style.display = "inline-block";

    statusText.innerHTML = "📸 사진 촬영 완료! <br>찾으려는 <b>책 제목</b>을 적고 <b>[책 찾기]</b>를 누르세요.";
}

// 2단계: 기기 자체 내부 OCR 라이브러리 구동 (비용 0원)
async function searchBookInSnapshot() {
    const targetTitle = bookInput.value.trim();
    if (!targetTitle) { alert("책 제목을 입력하세요."); bookInput.focus(); return; }

    searchBtn.disabled = true;
    resetBtn.disabled = true;
    searchBtn.textContent = "OCR 분석 중...";
    statusText.innerHTML = `⚙️ 기기 자체 엔진으로 <span class='highlight'>"${targetTitle}"</span> 추적 엔진 구동 중...`;

    // 캔버스 초기화 후 촬영 이미지 원본 복구
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(capturedImageElement, 0, 0, canvas.width, canvas.height);

    try {
        // Tesseract를 기동하여 한국어(kor)와 영어(eng)를 동시 인식하도록 설정
        const worker = await Tesseract.createWorker(['kor', 'eng']);
        const ret = await worker.recognize(capturedImageElement);
        const words = ret.data.words; // 탐색된 모든 단어 조각 배열
        await worker.terminate();

        let matchFound = false;

        // 공백을 없애서 입력어와 대상 단어를 유연하게 매칭하기 위함
        const cleanTarget = targetTitle.replace(/\s+/g, "");

        // 감지된 단어 배열을 돌면서 사용자가 찾으려는 단어가 포함되어 있는지 검사
        for (let word of words) {
            const cleanWord = word.text.replace(/\s+/g, "");
            
            if (cleanWord.includes(cleanTarget) || cleanTarget.includes(cleanWord)) {
                // 일치하는 단어를 발견하면 그 조각의 바운딩 박스를 즉시 캔버스에 드로잉
                drawTargetUI(word.bbox);
                matchFound = true;
                break; // 가장 먼저 발견된 것 하나만 표시 후 종료
            }
        }

        if (matchFound) {
            statusText.innerHTML = `🎯 <span style='color:#2ecc71; font-weight:bold;'>"${targetTitle}"</span> 발견했습니다!`;
        } else {
            statusText.innerHTML = `❌ <span style='color:#e74c3c; font-weight:bold;'>사진 안에서 해당 텍스트를 인식하지 못했습니다.</span>`;
            drawNotFoundUI();
        }

    } catch (error) {
        console.error(error);
        statusText.innerHTML = `<span style='color:red;'>오류 발생: ${error.message}</span>`;
    } finally {
        searchBtn.disabled = false;
        resetBtn.disabled = false;
        searchBtn.textContent = "🔍 책 찾기";
    }
}

// 3단계: 초기화 리셋
function resetToCamera() {
    capturedImageElement = null;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvas.style.display = "none";

    captureBtn.style.display = "inline-block";
    searchBtn.style.display = "none";
    resetBtn.style.display = "none";

    statusText.innerText = "카메라가 다시 시작되었습니다. [사진 찍기]를 누르세요.";
}

// Tesseract 가 제공하는 절대 픽셀 좌표 {x0, y0, x1, y1}를 사용해 화면에 사각형 그리기
function drawTargetUI(bbox) {
    const xmin = bbox.x0;
    const ymin = bbox.y0;
    const boxWidth = bbox.x1 - bbox.x0;
    const boxHeight = bbox.y1 - bbox.y0;
    
    const centerX = xmin + (boxWidth / 2);
    const targetTopY = ymin - 8;

    // 초록색 사각형 검출선 박스
    ctx.strokeStyle = '#2ecc71';
    ctx.lineWidth = Math.max(4, canvas.width / 250);
    ctx.strokeRect(xmin, ymin, boxWidth, boxHeight);

    // 상단 방향지시 화살표
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath();
    const arrowSize = Math.max(15, canvas.width / 60);
    ctx.moveTo(centerX - arrowSize, targetTopY - (arrowSize * 1.3));
    ctx.lineTo(centerX + arrowSize, targetTopY - (arrowSize * 1.3));
    ctx.lineTo(centerX, targetTopY);
    ctx.closePath();
    ctx.fill();
}

function drawNotFoundUI() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#e74c3c';
    ctx.font = 'bold 32px "Noto Sans KR", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('해당 책이 없습니다 ❌', canvas.width / 2, canvas.height / 2);
}
</script>
</body>
</html>
